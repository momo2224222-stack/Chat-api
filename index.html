<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/jpeg" href="chatgpt-icon.jpg" />
  <link rel="shortcut icon" type="image/jpeg" href="chatgpt-icon.jpg" />
  <title>童博GPT</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --panel: #f9f9f9;
      --sidebar: #f7f7f8;
      --sidebar-border: #e5e5e5;
      --text: #0d0d0d;
      --muted: #6b6b6b;
      --soft: #ececec;
      --hover: #ededed;
      --active: #e7e7e7;
      --button: #0d0d0d;
      --button-text: #ffffff;
      --danger: #d92d20;
      --accent: #10a37f;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.16);
      --radius: 8px;
      --sidebar-width: 252px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: transparent;
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      height: 100vh;
      min-width: 320px;
      transition: grid-template-columns 0.18s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .sidebar {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      background: var(--sidebar);
      border-right: 1px solid var(--sidebar-border);
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .app.sidebar-collapsed .sidebar {
      transform: translateX(-100%);
      border-right-color: transparent;
    }

    .side-top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 14px 14px 18px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      color: #111111;
    }

    .brand-mark img {
      width: 54px;
      height: 54px;
      display: block;
      object-fit: contain;
    }

    .side-tools {
      display: grid;
      gap: 3px;
      padding: 0 12px 8px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      min-height: 40px;
      padding: 0 8px;
      border-radius: 9px;
      color: #111111;
      font-size: 14px;
    }

    .tool-btn:hover {
      background: var(--hover);
    }

    .tool-btn .icon {
      width: 21px;
      height: 21px;
    }

    .side-search {
      display: none;
      padding: 0 12px 10px;
    }

    .sidebar.search-open .side-search {
      display: block;
    }

    .side-search input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--soft);
      border-radius: var(--radius);
      outline: 0;
      background: #ffffff;
      color: var(--text);
      padding: 0 12px;
      font-size: 13px;
    }

    .side-search input:focus {
      border-color: #b8b8b8;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
    }

    .side-section-label {
      padding: 4px 14px 6px;
      color: #9a9a9a;
      font-size: 12px;
      line-height: 1.2;
    }

    .icon-btn,
    .small-btn,
    .primary-btn,
    .ghost-btn {
      min-height: 38px;
      border-radius: var(--radius);
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
    }

    .icon-btn:hover,
    .small-btn:hover,
    .ghost-btn:hover {
      background: var(--hover);
    }

    .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: #333333;
    }

    .sessions {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    .session {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 28px 28px;
      align-items: center;
      gap: 4px;
      height: 38px;
      padding: 0 3px 0 10px;
      border-radius: var(--radius);
      color: #111111;
      font-size: 14px;
      font-weight: 540;
    }

    .session:hover {
      background: var(--hover);
    }

    .session.active {
      background: var(--active);
    }

    .session.generating {
      animation: sessionGeneratingPulse 1.35s ease-in-out infinite;
    }

    .session.generating::before {
      content: "";
      position: absolute;
      left: 4px;
      width: 4px;
      height: 18px;
      border-radius: 999px;
      background: var(--accent);
      animation: sessionGeneratingDot 1.35s ease-in-out infinite;
    }

    @keyframes sessionGeneratingPulse {
      0%, 100% {
        background: rgba(16, 163, 127, 0.08);
      }
      50% {
        background: rgba(13, 13, 13, 0.12);
      }
    }

    @keyframes sessionGeneratingDot {
      0%, 100% {
        opacity: 0.35;
      }
      50% {
        opacity: 1;
      }
    }

    .session-title {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: left;
      color: #111111;
      font-weight: 540;
    }

    .empty-sessions {
      padding: 14px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .rename-session,
    .delete-session {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: #777777;
      opacity: 0;
    }

    .session:hover .rename-session,
    .session.active .rename-session,
    .session:hover .delete-session,
    .session.active .delete-session {
      opacity: 1;
    }

    .rename-session:hover {
      color: #111111;
      background: #ffffff;
    }

    .delete-session:hover {
      color: var(--danger);
      background: #ffffff;
    }

    .rename-input {
      width: 100%;
      height: 32px;
      border: 1px solid #cfcfcf;
      border-radius: 7px;
      outline: 0;
      padding: 0 8px;
      background: #ffffff;
      font-size: 14px;
    }

    .delete-confirm {
      position: absolute;
      right: 8px;
      top: 38px;
      z-index: 5;
      display: grid;
      gap: 8px;
      width: 176px;
      padding: 10px;
      border: 1px solid #dddddd;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.16);
    }

    .delete-confirm::before {
      content: "";
      position: absolute;
      right: 13px;
      top: -6px;
      width: 10px;
      height: 10px;
      border-left: 1px solid #dddddd;
      border-top: 1px solid #dddddd;
      background: #ffffff;
      transform: rotate(45deg);
    }

    .delete-confirm-text {
      color: #222222;
      font-size: 13px;
      line-height: 1.35;
    }

    .delete-confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .delete-confirm-actions button {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 7px;
      font-size: 12px;
    }

    .delete-cancel {
      background: #f3f3f3;
      color: #333333;
    }

    .delete-ok {
      background: #111111;
      color: #ffffff;
    }

    .side-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--sidebar-border);
    }

    .small-btn,
    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid var(--soft);
      background: #ffffff;
      font-size: 13px;
      white-space: nowrap;
    }

    .main {
      position: relative;
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: 8px 16px;
      border-bottom: 1px solid transparent;
    }

    .mobile-menu {
      display: inline-grid;
    }

    .title-wrap {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 8px;
    }

    .app-title {
      max-width: min(56vw, 620px);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0;
    }

    .model-pill {
      min-width: 0;
      max-width: min(44vw, 520px);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: 13px;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px 0 30px;
      scroll-behavior: smooth;
    }

    .main.empty-chat .messages {
      flex: 1;
      padding-bottom: 210px;
    }

    .empty {
      display: grid;
      align-content: center;
      justify-items: center;
      min-height: 100%;
      padding: 24px;
      text-align: center;
    }

    .empty h1 {
      margin: 0 0 22px;
      font-size: clamp(28px, 4vw, 34px);
      font-weight: 400;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: min(680px, 100%);
    }

    .quick {
      min-height: 68px;
      padding: 12px 14px;
      border: 1px solid var(--soft);
      border-radius: var(--radius);
      text-align: left;
      background: #ffffff;
      color: #333333;
    }

    .quick:hover {
      background: var(--panel);
    }

    .quick strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    .quick span {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .message-row {
      width: 100%;
      padding: 18px 20px;
    }

    .message-row.user {
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .message-inner {
      display: block;
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .message-row.user .message-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .avatar {
      display: none;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #0d0d0d;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
    }

    .avatar.assistant {
      background: var(--accent);
    }

    .message-row.user .avatar {
      display: none;
    }

    .bubble {
      min-width: 0;
      padding-top: 0;
      color: #1f1f1f;
      line-height: 1.72;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .message-row.user .bubble {
      max-width: min(780px, 90%);
      margin-left: auto;
      padding: 11px 15px;
      border-radius: 18px;
      background: #f3f3f3;
      color: #1f1f1f;
      line-height: 1.55;
    }

    .message-row.assistant .bubble {
      max-width: 100%;
      padding: 2px 0;
    }

    .message-row.assistant .bubble.streaming-plain {
      white-space: pre-wrap;
    }

    .message-row.assistant .bubble.empty-bubble {
      display: none;
    }

    .message-copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      margin-top: 6px;
      padding: 0 8px;
      border-radius: 8px;
      color: #8a8a8a;
      font-size: 12px;
    }

    .message-copy-btn:hover {
      background: #f1f1f1;
      color: #333333;
    }

    .message-row.user .message-copy-btn {
      align-self: flex-end;
    }

    .thinking-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 24px;
      margin-top: 2px;
      color: #9a9a9a;
      font-size: 13px;
      line-height: 1.4;
    }

    .thinking-status.active {
      animation: thinkingTextPulse 1.35s ease-in-out infinite;
    }

    .thinking-status.finished {
      color: #a4a4a4;
    }

    .thinking-dot {
      flex: 0 0 26px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 10px 0 0 currentColor, 20px 0 0 currentColor;
      animation: thinkingDots 1.15s ease-in-out infinite;
    }

    .thinking-status.finished .thinking-dot {
      display: none;
    }

    @keyframes thinkingTextPulse {
      0%, 100% {
        opacity: 0.48;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes thinkingDots {
      0%, 100% {
        opacity: 0.35;
        transform: translateY(1px);
      }
      50% {
        opacity: 1;
        transform: translateY(-1px);
      }
    }

    .message-attachments {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: min(780px, 90%);
      margin: 8px 0 0 auto;
    }

    .message-row.assistant .message-attachments {
      justify-content: flex-start;
      margin-left: 0;
      margin-right: auto;
    }

    .message-attachment {
      position: relative;
      overflow: hidden;
      border: 1px solid #e1e1e1;
      border-radius: 14px;
      background: #f7f7f7;
    }

    .message-attachment.image {
      width: auto;
      height: auto;
      max-width: min(420px, 100%);
      background: #eeeeee;
    }

    .message-attachment.image img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 360px;
      display: block;
      object-fit: contain;
    }

    .image-preview-btn {
      display: block;
      padding: 0;
      background: transparent;
      cursor: zoom-in;
    }

    .image-download-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: auto;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      color: #111111;
      font-size: 13px;
      font-weight: 520;
      backdrop-filter: blur(8px);
    }

    .image-download-btn:hover {
      background: rgba(255, 255, 255, 0.82);
    }

    .image-generate-visual {
      position: relative;
      width: min(280px, 100%);
      height: 156px;
      margin-top: 12px;
      overflow: hidden;
      border: 1px solid #dfe4ea;
      border-radius: 16px;
      background:
        radial-gradient(circle at 24% 30%, rgba(11, 132, 255, 0.22), transparent 24%),
        radial-gradient(circle at 78% 64%, rgba(16, 163, 127, 0.20), transparent 26%),
        linear-gradient(135deg, #f8fbff, #eef4f8);
    }

    .image-generate-visual::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 12px;
      background:
        linear-gradient(145deg, transparent 48%, rgba(16, 163, 127, 0.36) 49%, rgba(16, 163, 127, 0.36) 56%, transparent 57%),
        linear-gradient(35deg, transparent 52%, rgba(11, 132, 255, 0.34) 53%, rgba(11, 132, 255, 0.34) 62%, transparent 63%),
        rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
      animation: imageCanvasPulse 1.7s ease-in-out infinite;
    }

    .image-generate-visual::after {
      content: "";
      position: absolute;
      top: -40%;
      left: -35%;
      width: 46%;
      height: 190%;
      transform: rotate(18deg);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.85), transparent);
      animation: imageBrushSweep 1.55s ease-in-out infinite;
    }

    .image-generate-dot {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #0b84ff;
      animation: imageSpark 1.4s ease-in-out infinite;
    }

    .image-generate-dot:nth-child(1) {
      left: 62px;
      top: 42px;
      animation-delay: 0s;
    }

    .image-generate-dot:nth-child(2) {
      right: 70px;
      top: 58px;
      background: #10a37f;
      animation-delay: 0.22s;
    }

    .image-generate-dot:nth-child(3) {
      left: 136px;
      bottom: 42px;
      background: #111111;
      animation-delay: 0.44s;
    }

    @keyframes imageCanvasPulse {
      0%, 100% {
        opacity: 0.62;
        transform: scale(0.985);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes imageBrushSweep {
      0% {
        left: -42%;
        opacity: 0;
      }
      25%, 70% {
        opacity: 1;
      }
      100% {
        left: 104%;
        opacity: 0;
      }
    }

    @keyframes imageSpark {
      0%, 100% {
        opacity: 0.25;
        transform: translateY(4px) scale(0.7);
      }
      50% {
        opacity: 1;
        transform: translateY(-4px) scale(1);
      }
    }

    .message-attachment.file {
      display: flex;
      align-items: center;
      gap: 9px;
      max-width: 260px;
      min-height: 50px;
      padding: 8px 10px;
      color: #333333;
      font-size: 13px;
    }

    .message-attachment.file .attachment-thumb {
      width: 34px;
      height: 34px;
    }

    .message-time {
      width: min(980px, 100%);
      margin: 0 auto 6px;
      color: #8a8a8a;
      font-size: 12px;
      line-height: 1.2;
    }

    .message-row.user .message-time {
      text-align: right;
      padding-right: 2px;
    }

    .message-row.assistant .message-time {
      text-align: left;
    }

    .bubble p {
      margin: 0 0 12px;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble h1,
    .bubble h2,
    .bubble h3 {
      margin: 18px 0 10px;
      line-height: 1.32;
      font-weight: 650;
    }

    .bubble h1 {
      font-size: 24px;
    }

    .bubble h2 {
      font-size: 20px;
    }

    .bubble h3 {
      font-size: 17px;
    }

    .bubble ul,
    .bubble ol {
      margin: 8px 0 14px 22px;
      padding: 0;
    }

    .bubble li {
      margin: 5px 0;
      padding-left: 2px;
    }

    .bubble blockquote {
      margin: 12px 0;
      padding: 2px 0 2px 14px;
      border-left: 3px solid #d0d0d0;
      color: #4f4f4f;
    }

    .bubble table {
      width: 100%;
      margin: 14px 0;
      border-collapse: collapse;
      font-size: 14px;
    }

    .bubble th,
    .bubble td {
      border: 1px solid #dedede;
      padding: 8px 10px;
      vertical-align: top;
    }

    .bubble th {
      background: #f6f6f6;
      font-weight: 650;
    }

    .bubble a {
      color: #0b6bcb;
      text-decoration: none;
    }

    .bubble a:hover {
      text-decoration: underline;
    }

    .bubble strong {
      font-weight: 650;
    }

    .bubble hr {
      height: 1px;
      margin: 18px 0;
      border: 0;
      background: #dedede;
    }

    .bubble code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #f0f0f0;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .code-block {
      overflow: hidden;
      margin: 14px 0 18px;
      border: 1px solid #ececec;
      border-radius: 18px;
      background: #f7f7f8;
    }

    .code-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 44px;
      padding: 0 14px 0 18px;
      color: #171717;
      background: #f7f7f8;
      font-size: 14px;
    }

    .code-lang {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 500;
    }

    .code-copy {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      color: #333333;
    }

    .code-copy:hover {
      background: #e8e8e8;
    }

    .code-block pre {
      overflow: auto;
      margin: 0;
      padding: 16px 18px 18px;
      color: #1f2328;
      background: #f7f7f8;
      line-height: 1.55;
      font-size: 14px;
      tab-size: 2;
    }

    .code-block code {
      padding: 0;
      background: transparent;
      color: inherit;
      font-size: inherit;
    }

    .tok-keyword,
    .tok-builtin {
      color: #7c3aed;
    }

    .tok-string {
      color: #0a7f3f;
    }

    .tok-number {
      color: #b45309;
    }

    .tok-comment {
      color: #7a7a7a;
    }

    .tok-variable {
      color: #6d28d9;
    }

    .composer-shell {
      position: relative;
      z-index: 4;
      margin-top: -72px;
      padding: 66px 16px 18px;
      background: transparent;
    }

    .main.empty-chat .composer-shell {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-12%);
      padding: 0 16px;
      background: transparent;
    }

    .composer {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px;
      grid-template-rows: auto 42px;
      gap: 8px;
      width: min(940px, 100%);
      margin: 0 auto;
      padding: 16px 18px 12px;
      border: 1px solid #d2d2d2;
      border-radius: 34px;
      background: #ffffff;
      box-shadow: 0 -10px 28px rgba(0, 0, 0, 0.06), 0 8px 22px rgba(0, 0, 0, 0.08);
    }

    .composer textarea {
      grid-column: 1 / -1;
      width: 100%;
      max-height: 220px;
      min-height: 46px;
      resize: none;
      border: 0;
      outline: 0;
      padding: 0;
      color: var(--text);
      background: transparent;
      line-height: 1.45;
      font-size: 18px;
    }

    .send-btn {
      display: grid;
      place-items: center;
      align-self: end;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--button);
      color: var(--button-text);
    }

    .composer-tools {
      position: relative;
      display: flex;
      align-items: center;
      align-self: end;
      gap: 8px;
      min-width: 0;
    }

    .add-btn,
    .image-generate-btn,
    .image-size-btn,
    .thinking-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border-radius: 999px;
    }

    .add-btn {
      width: 36px;
      color: #111111;
      font-size: 30px;
      line-height: 1;
    }

    .image-generate-btn {
      gap: 8px;
      padding: 0 10px;
      color: #111111;
      font-size: 16px;
      font-weight: 520;
      white-space: nowrap;
    }

    .image-generate-btn.active {
      color: #0574ff;
    }

    .image-generate-btn .icon {
      width: 22px;
      height: 22px;
    }

    .image-size-btn {
      display: none;
      gap: 8px;
      padding: 0 10px;
      color: #202020;
      font-size: 16px;
      font-weight: 520;
      white-space: nowrap;
    }

    .image-size-btn .chevron {
      width: 16px;
      height: 16px;
    }

    .image-size-btn.visible {
      display: inline-flex;
    }

    .add-btn:hover,
    .image-generate-btn:hover,
    .image-size-btn:hover,
    .thinking-btn:hover {
      background: #f1f1f1;
    }

    .attach-menu {
      position: absolute;
      left: 0;
      bottom: 42px;
      z-index: 8;
      display: none;
      min-width: 168px;
      padding: 6px;
      border: 1px solid #dfdfdf;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.16);
    }

    .attach-menu.open {
      display: grid;
    }

    .attach-option {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      padding: 0 10px;
      border-radius: 8px;
      color: #222222;
      font-size: 14px;
      text-align: left;
    }

    .attach-option:hover {
      background: #f4f4f4;
    }

    .attachment-list {
      grid-column: 1 / -1;
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 2px;
    }

    .attachment-list.has-items {
      display: flex;
    }

    .attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 240px;
      min-height: 48px;
      padding: 6px 8px 6px 6px;
      border: 1px solid #e3e3e3;
      border-radius: 12px;
      background: #f7f7f7;
      color: #333333;
      font-size: 12px;
    }

    .attachment-thumb {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      overflow: hidden;
      flex: 0 0 auto;
      border-radius: 8px;
      background: #ffffff;
      color: #666666;
      border: 1px solid #e6e6e6;
    }

    .attachment-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .attachment-thumb .icon {
      width: 18px;
      height: 18px;
    }

    .attachment-chip span {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .attachment-chip button {
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      color: #777777;
    }

    .attachment-chip button:hover {
      background: #e5e5e5;
      color: #111111;
    }

    .thinking-btn {
      gap: 8px;
      padding: 0 10px;
      color: #0b84ff;
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
    }

    .thinking-btn .icon {
      width: 19px;
      height: 19px;
    }

    .mode-menu {
      position: absolute;
      left: 42px;
      bottom: 42px;
      z-index: 8;
      display: none;
      min-width: 172px;
      padding: 6px;
      border: 1px solid #dfdfdf;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.16);
    }

    .mode-menu.open {
      display: grid;
    }

    .mode-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 36px;
      padding: 0 10px;
      border-radius: 8px;
      color: #222222;
      font-size: 14px;
      text-align: left;
    }

    .mode-option:hover {
      background: #f4f4f4;
    }

    .mode-option.active {
      color: #0b84ff;
      background: #eef6ff;
    }

    .image-size-menu {
      position: absolute;
      left: 154px;
      bottom: 42px;
      z-index: 8;
      display: none;
      min-width: 216px;
      padding: 6px;
      border: 1px solid #dfdfdf;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.16);
    }

    .image-size-menu.open {
      display: grid;
    }

    .image-size-menu-title {
      padding: 2px 6px 5px;
      color: #8a8a8a;
      font-size: 12px;
      line-height: 1.2;
    }

    .image-size-option {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 0 6px;
      border-radius: 7px;
      color: #222222;
      font-size: 13px;
      text-align: left;
    }

    .ratio-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      border: 2px solid #1f1f1f;
      border-radius: 5px;
    }

    .ratio-icon.auto {
      position: relative;
      width: 18px;
      height: 14px;
      border-width: 2px;
      border-radius: 3px;
    }

    .ratio-icon.auto::after {
      content: "";
      position: absolute;
      right: 3px;
      bottom: 3px;
      width: 6px;
      height: 3px;
      border: 2px solid #1f1f1f;
      border-radius: 2px;
      background: #ffffff;
    }

    .ratio-icon.square {
      width: 18px;
      height: 18px;
    }

    .ratio-icon.portrait {
      width: 16px;
      height: 21px;
    }

    .ratio-icon.story {
      width: 14px;
      height: 23px;
    }

    .ratio-icon.landscape {
      width: 22px;
      height: 16px;
    }

    .ratio-icon.widescreen {
      width: 25px;
      height: 15px;
    }

    .ratio-name {
      color: #111111;
    }

    .ratio-value {
      color: #8a8a8a;
    }

    .image-size-option .check {
      margin-left: auto;
      color: #111111;
      font-size: 15px;
    }

    .image-size-option:hover {
      background: #f4f4f4;
    }

    .image-size-option.active {
      color: #0b84ff;
      background: #eef6ff;
    }

    .send-btn:disabled {
      cursor: not-allowed;
      background: #d7d7d7;
      color: #808080;
    }

    .hint {
      width: min(940px, 100%);
      margin: 8px auto 0;
      color: #858585;
      text-align: center;
      font-size: 12px;
    }

    .scroll-top-btn {
      position: fixed;
      right: 22px;
      bottom: 98px;
      z-index: 12;
      display: none;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid #dedede;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      color: #333333;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(8px);
    }

    .scroll-top-btn.show {
      display: grid;
    }

    .scroll-top-btn:hover {
      background: #ffffff;
    }

    .selection-ask-btn {
      position: fixed;
      z-index: 30;
      display: none;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid #d7d7d7;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: #111111;
      font-size: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
      backdrop-filter: blur(8px);
    }

    .selection-ask-btn.show {
      display: inline-flex;
    }

    .selection-ask-btn:hover {
      background: #ffffff;
    }

    .selection-ask-btn .quote-mark {
      font-size: 25px;
      font-weight: 800;
      line-height: 1;
    }


    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.38);
      z-index: 20;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .image-viewer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 28px;
      background: rgba(0, 0, 0, 0.72);
    }

    .image-viewer.open {
      display: grid;
    }

    .image-viewer img {
      max-width: min(96vw, 1280px);
      max-height: 88vh;
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
      object-fit: contain;
    }

    .image-viewer .icon-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      background: rgba(255, 255, 255, 0.92);
    }

    .modal {
      display: flex;
      flex-direction: column;
      width: min(760px, 100%);
      max-height: calc(100vh - 24px);
      max-height: calc(100dvh - 24px);
      overflow: hidden;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--soft);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
    }

    .modal-body {
      display: grid;
      gap: 18px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: #2d2d2d;
      font-size: 13px;
      font-weight: 600;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid #d9d9d9;
      border-radius: var(--radius);
      outline: 0;
      background: #ffffff;
      color: var(--text);
      padding: 10px 11px;
      font-size: 14px;
    }

    .field textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.5;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: #9a9a9a;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 70px;
      gap: 10px;
      align-items: center;
    }

    .modal-actions {
      display: flex;
      flex: 0 0 auto;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid var(--soft);
    }

    .settings-file-actions,
    .right-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 15px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 600;
    }

    .primary-btn:hover {
      background: #333333;
    }

    .import-input {
      display: none;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #111111;
      color: #ffffff;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 30;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    body.sidebar-open .sidebar {
      transform: translateX(0);
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
      }

      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 15;
        width: min(var(--sidebar-width), 86vw);
        transform: translateX(-100%);
        transition: transform 0.18s ease;
        box-shadow: var(--shadow);
      }

      .app.sidebar-collapsed .sidebar {
        transform: translateX(-100%);
        border-right-color: var(--sidebar-border);
      }

      body.sidebar-open .app.sidebar-collapsed .sidebar,
      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .topbar {
        padding-left: 10px;
      }

      .model-pill {
        display: none;
      }

      .quick-grid,
      .field-grid {
        grid-template-columns: 1fr;
      }

      .message-row {
        padding-left: 12px;
        padding-right: 12px;
      }

      .message-inner {
        width: 100%;
      }

      .message-row.user .bubble {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="会话侧边栏">
      <div class="side-top">
        <div class="brand-mark" aria-label="童博GPT">
          <img src="chatgpt-icon.jpg" alt="童博GPT" />
        </div>
      </div>
      <div class="side-tools">
        <button class="tool-btn" id="newChatBtn" title="新建会话">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          <span>New chat</span>
        </button>
        <button class="tool-btn" id="searchChatsBtn" title="搜索会话">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Search chats</span>
        </button>
      </div>
      <div class="side-search">
        <input id="sessionSearch" type="search" placeholder="搜索会话和消息" autocomplete="off" />
      </div>
      <div class="side-section-label">Recents</div>
      <div class="sessions" id="sessionList"></div>
      <div class="side-actions">
        <button class="small-btn" id="exportJsonBtn" title="导出 JSON">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          JSON
        </button>
        <button class="small-btn" id="importBtn" title="导入 JSON">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          导入
        </button>
        <button class="small-btn" id="exportTxtBtn" title="导出 TXT">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
          TXT
        </button>
      </div>
      <input class="import-input" id="importFile" type="file" accept="application/json,.json" />
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-wrap">
          <button class="icon-btn mobile-menu" id="mobileMenuBtn" title="收起或打开侧边栏">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div class="app-title" id="currentTitle">ChatGPT</div>
          <div class="model-pill" id="modelPill" hidden></div>
        </div>
        <button class="small-btn" id="settingsBtn" title="API 与对话设置">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.37.58.6 1 .6H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1.4z"/></svg>
          设置
        </button>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <footer class="composer-shell">
        <form class="composer" id="chatForm">
          <div class="attachment-list" id="attachmentList"></div>
          <textarea id="promptInput" rows="1" placeholder="Ask anything"></textarea>
          <div class="composer-tools">
            <button class="add-btn" id="addAttachmentBtn" type="button" title="上传文件或图片">+</button>
            <div class="attach-menu" id="attachMenu">
              <button class="attach-option" id="uploadFileBtn" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                上传文件
              </button>
              <button class="attach-option" id="uploadImageBtn" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                上传图片
              </button>
            </div>
            <button class="image-generate-btn" id="generateImageBtn" type="button" title="用 gpt-image-2 生成图片">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="9" cy="9" r="1.7"/><path d="m20 15-4.5-4.5L5 20"/></svg>
              <span>Image</span>
            </button>
            <button class="image-size-btn" id="imageSizeBtn" type="button" aria-haspopup="true" aria-expanded="false" title="选择图片比例">
              <span id="imageSizeLabel">Auto</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div class="image-size-menu" id="imageSizeMenu" role="menu">
              <div class="image-size-menu-title">Choose image aspect ratio</div>
              <button class="image-size-option active" type="button" data-size="auto" role="menuitem"><span class="ratio-icon auto"></span><span class="ratio-name">Auto</span><span class="check">✓</span></button>
              <button class="image-size-option" type="button" data-size="square" role="menuitem"><span class="ratio-icon square"></span><span class="ratio-name">Square</span><span class="ratio-value">1:1</span><span class="check"></span></button>
              <button class="image-size-option" type="button" data-size="portrait" role="menuitem"><span class="ratio-icon portrait"></span><span class="ratio-name">Portrait</span><span class="ratio-value">3:4</span><span class="check"></span></button>
              <button class="image-size-option" type="button" data-size="story" role="menuitem"><span class="ratio-icon story"></span><span class="ratio-name">Story</span><span class="ratio-value">9:16</span><span class="check"></span></button>
