    function exportTxt() {
      const blocks = state.sessions.map(session => {
        const header = [
          "========================================",
          `会话：${session.title || "新聊天"}`,
          `创建：${formatDate(session.createdAt)}`,
          `更新：${formatDate(session.updatedAt)}`,

        ].join("\n");
        const body = session.messages
          .filter(m => m.role === "user" || m.role === "assistant")
          .map(m => `${m.role === "user" ? "我" : "AI"}（${formatDate(m.createdAt)}）：\n${m.content}`)
          .join("\n\n----------------------------------------\n\n");
        return header + "\n\n" + (body || "（空会话）");
      }).join("\n\n\n");

    async function importJsonFile(file) {
      try {
        const text = await file.text();
        const imported = JSON.parse(text);
        const incoming = Array.isArray(imported) ? imported : imported.sessions;
        if (!Array.isArray(incoming)) throw new Error("JSON 中没有 sessions 数组");
        const existingIds = new Set(state.sessions.map(session => session.id));
        const existingFingerprints = new Set(state.sessions.map(sessionFingerprint));
        let added = 0;
        incoming.map(normalizeSession).filter(Boolean).forEach(session => {
          const fingerprint = sessionFingerprint(session);
          if (!existingIds.has(session.id) && !existingFingerprints.has(fingerprint)) {
            state.sessions.push(session);
            existingIds.add(session.id);
            existingFingerprints.add(fingerprint);
            added += 1;
          }
        });
        if (added > 0) state.currentSessionId = state.sessions[state.sessions.length - added].id;
        saveState();
        renderAll();
        toast(added ? `导入完成，新增 ${added} 个会话` : "没有重复导入，所有会话都已存在");
      } catch (error) {
        toast("导入失败：" + (error.message || String(error)));
      } finally {
        els.importFile.value = "";
      }
    }

    async function importSettingsFile(file) {
      try {
        const text = await file.text();
        const imported = JSON.parse(text);
        const incoming = imported && typeof imported === "object" && imported.settings
          ? imported.settings
          : imported;
        if (!incoming || typeof incoming !== "object" || Array.isArray(incoming)) {
          throw new Error("JSON 中没有 settings 对象");
        }
        state.settings = normalizeImportedSettings(incoming, collectSettingsFromForm());
        applySettingsToForm(state.settings);
        saveState();
        updateHeader();
        toast("设置已导入");
      } catch (error) {
        toast("导入设置失败：" + (error.message || String(error)));
      } finally {
        els.settingsImportFile.value = "";
      }
    }

    function normalizeImportedSettings(input, baseSettings = state.settings) {
      const imported = compactImportedSettings(input, baseSettings);
      const settings = { ...DEFAULT_SETTINGS, ...baseSettings, ...imported };
      settings.providerPreset = String(settings.providerPreset || DEFAULT_SETTINGS.providerPreset);
      settings.baseUrl = cleanBaseUrl(settings.baseUrl);
      settings.apiPath = cleanPath(settings.apiPath || DEFAULT_SETTINGS.apiPath);
      settings.apiKey = String(settings.apiKey || "");
      settings.model = String(settings.model || DEFAULT_SETTINGS.model).trim();
      settings.imageBaseUrl = cleanBaseUrl(settings.imageBaseUrl);
      settings.imageApiPath = cleanPath(settings.imageApiPath || DEFAULT_SETTINGS.imageApiPath);
      settings.imageApiKey = String(settings.imageApiKey || "");
      settings.imageModel = String(settings.imageModel || "gpt-image-2").trim();
      settings.imageSize = normalizeImageSize(settings.imageSize);
      settings.systemPrompt = String(settings.systemPrompt || "");
      settings.temperature = clamp(Number(settings.temperature ?? DEFAULT_SETTINGS.temperature), 0, 2);
      settings.maxTokens = String(settings.maxTokens || "").trim();
      settings.thinkingMode = MODE_CONFIG[settings.thinkingMode] ? settings.thinkingMode : DEFAULT_SETTINGS.thinkingMode;
      return settings;
    }

    function compactImportedSettings(input, baseSettings) {
      const output = {};
      Object.entries(input || {}).forEach(([key, value]) => {
        const current = baseSettings?.[key];
        if (typeof value === "string" && value.trim() === "" && String(current || "").trim()) return;
        output[key] = value;
      });
      return output;
    }

    function sessionFingerprint(session) {
      return session.messages
        .map(m => `${m.role}:${m.content}`)
        .join("|");
    }

        toggleImageSizeMenu(false);
        toggleAttachMenu(false);
        closeImageViewer();
      }
    });
    document.addEventListener("selectionchange", () => {
      window.clearTimeout(updateSelectionAskButton.timer);
      updateSelectionAskButton.timer = window.setTimeout(updateSelectionAskButton, 80);
    });
    document.addEventListener("mouseup", () => {
      window.setTimeout(updateSelectionAskButton, 0);
    });
    document.addEventListener("scroll", hideSelectionAskButton, true);
    document.addEventListener("click", event => {
      if (!event.target.closest(".selection-ask-btn")) hideSelectionAskButton();
      if (!event.target.closest(".delete-confirm") && !event.target.closest(".delete-session")) {
        els.sessionList.querySelectorAll(".delete-confirm").forEach(node => node.remove());
      }
      if (!event.target.closest(".thinking-btn") && !event.target.closest(".mode-menu")) {
        toggleThinkingMenu(false);
      }
      if (!event.target.closest(".image-size-btn") && !event.target.closest(".image-size-menu")) {
        toggleImageSizeMenu(false);
      }
      if (!event.target.closest(".add-btn") && !event.target.closest(".attach-menu")) {
        toggleAttachMenu(false);
      }
    });

    renderAll();
    hydrateStoredImages();
  </script>
</body>
</html>
