  <script>
    const STORAGE_KEY = "ai-chat-client-state-v1";
    const IMAGE_DB_NAME = "ai-chat-client-images";
    const IMAGE_DB_STORE = "images";
    const EMBEDDED_API_KEY = "";
    const STANDARD_DEVELOPER_PROMPT = `
你是一个准确、简洁的AI助手。优先直接回答用户问题，避免不必要展开。对于简单问题，给出明确结论和必要解释。对于信息不足的问题，在合理假设下继续回答，并简要说明假设。不要输出隐藏思维链，不要展示完整内部推理过程。涉及代码、命令或配置时，必须使用 Markdown 围栏代码块并标注合适语言。输出应简洁、清楚、可执行。
`.trim();

    const DEEP_DEVELOPER_PROMPT = `
你是一个严谨、系统化的AI助手。对复杂问题先进行充分的内部分析、拆解和校验，但不要向用户输出隐藏思维链或完整内部推理过程。最终回答应包含清晰结论、关键依据、必要步骤、边界条件、风险和不确定性。对于技术问题，优先按“现象→原因→验证方法→解决建议”的结构回答。对于代码问题，优先给出可运行实现和关键解释，并必须使用 Markdown 围栏代码块标注合适语言。对于架构、论文、方案类问题，输出结构化、可复用、可执行的内容。
`.trim();

    const MODE_CONFIG = {
      standard: {
        reasoningEffort: "low",
        developerPrompt: STANDARD_DEVELOPER_PROMPT,
        label: "标准思考"
      },
      deep: {
        reasoningEffort: "high",
        developerPrompt: DEEP_DEVELOPER_PROMPT,
        label: "深度思考"
      }
    };

    const IMAGE_SIZE_OPTIONS = {
      auto: "Auto",
      square: "Square 1:1",
      portrait: "Portrait 3:4",
      story: "Story 9:16",
      landscape: "Landscape 4:3",
      widescreen: "Widescreen 16:9"
    };

    const IMAGE_SIZE_API_VALUES = {
      square: "1024x1024",
      portrait: "1024x1365",
      story: "1024x1792",
      landscape: "1365x1024",
      widescreen: "1792x1024"
    };

    const DEFAULT_SETTINGS = {
      providerPreset: "compatible",
      baseUrl: "",
      apiPath: "/v1/chat/completions",
      apiKey: "",
      model: "gpt-4o-mini",
      imageBaseUrl: "",
      imageApiPath: "/v1/images/generations",
      imageApiKey: "",
      imageModel: "gpt-image-2",
      imageSize: "auto",
      systemPrompt: "你是一个有帮助、准确、简洁的 AI 助手。",
      temperature: 0.7,
      maxTokens: "",
      thinkingMode: "standard"
    };

    function isLocalProxyOrigin() {
      return ["127.0.0.1", "localhost"].includes(window.location.hostname)
        && /^https?:$/.test(window.location.protocol);
    }

    function getDefaultSettings() {
      const settings = { ...DEFAULT_SETTINGS };
      if (isLocalProxyOrigin()) {
        settings.providerPreset = "proxy";
        settings.baseUrl = window.location.origin;
        settings.apiPath = "/v1/chat/completions";
        settings.model = "gpt-5.5";
        settings.imageBaseUrl = window.location.origin;
        settings.imageApiPath = "/api/image/generations";
        settings.imageModel = "gpt-image-2";
      }
      return settings;
    }

    function fillLocalProxySettings(settings) {
      if (!isLocalProxyOrigin()) return settings;
      const origin = window.location.origin;
      if (!settings.baseUrl) settings.baseUrl = origin;
      if (!settings.apiPath) settings.apiPath = "/v1/chat/completions";
      if (!settings.model || settings.model === DEFAULT_SETTINGS.model) settings.model = "gpt-5.5";
      if (!settings.imageBaseUrl) settings.imageBaseUrl = origin;
      if (!settings.imageApiPath || settings.imageApiPath === DEFAULT_SETTINGS.imageApiPath) {
        settings.imageApiPath = "/api/image/generations";
      }
      if (!settings.imageModel) settings.imageModel = "gpt-image-2";
      if (settings.providerPreset === "compatible") settings.providerPreset = "proxy";
      return settings;
    }

    const els = {
      app: document.querySelector(".app"),
      sidebar: document.querySelector(".sidebar"),
      sessionList: document.getElementById("sessionList"),
      messages: document.getElementById("messages"),
      newChatBtn: document.getElementById("newChatBtn"),
      searchChatsBtn: document.getElementById("searchChatsBtn"),
      exportJsonBtn: document.getElementById("exportJsonBtn"),
      exportTxtBtn: document.getElementById("exportTxtBtn"),
      importBtn: document.getElementById("importBtn"),
      importFile: document.getElementById("importFile"),
      sessionSearch: document.getElementById("sessionSearch"),
      currentTitle: document.getElementById("currentTitle"),
      modelPill: document.getElementById("modelPill"),
      settingsBtn: document.getElementById("settingsBtn"),
      mobileMenuBtn: document.getElementById("mobileMenuBtn"),
      settingsModal: document.getElementById("settingsModal"),
      closeSettingsBtn: document.getElementById("closeSettingsBtn"),
      cancelSettingsBtn: document.getElementById("cancelSettingsBtn"),
      saveSettingsBtn: document.getElementById("saveSettingsBtn"),
      exportSettingsBtn: document.getElementById("exportSettingsBtn"),
      importSettingsBtn: document.getElementById("importSettingsBtn"),
      settingsImportFile: document.getElementById("settingsImportFile"),
      clearAllBtn: document.getElementById("clearAllBtn"),
      chatForm: document.getElementById("chatForm"),
      promptInput: document.getElementById("promptInput"),
      addAttachmentBtn: document.getElementById("addAttachmentBtn"),
      generateImageBtn: document.getElementById("generateImageBtn"),
      imageSizeBtn: document.getElementById("imageSizeBtn"),
      imageSizeLabel: document.getElementById("imageSizeLabel"),
      imageSizeMenu: document.getElementById("imageSizeMenu"),
      attachMenu: document.getElementById("attachMenu"),
      uploadFileBtn: document.getElementById("uploadFileBtn"),
      uploadImageBtn: document.getElementById("uploadImageBtn"),
      fileAttachmentInput: document.getElementById("fileAttachmentInput"),
      imageAttachmentInput: document.getElementById("imageAttachmentInput"),
      attachmentList: document.getElementById("attachmentList"),
      sendBtn: document.getElementById("sendBtn"),
      sendIcon: document.getElementById("sendIcon"),
      thinkingModeBtn: document.getElementById("thinkingModeBtn"),
      thinkingModeLabel: document.getElementById("thinkingModeLabel"),
      thinkingModeMenu: document.getElementById("thinkingModeMenu"),
      providerPreset: document.getElementById("providerPreset"),
      baseUrl: document.getElementById("baseUrl"),
      apiPath: document.getElementById("apiPath"),
      apiKey: document.getElementById("apiKey"),
      modelName: document.getElementById("modelName"),
      imageBaseUrl: document.getElementById("imageBaseUrl"),
      imageApiPath: document.getElementById("imageApiPath"),
      imageApiKey: document.getElementById("imageApiKey"),
      imageModel: document.getElementById("imageModel"),
      imageViewer: document.getElementById("imageViewer"),
      imageViewerImg: document.getElementById("imageViewerImg"),
      closeImageViewerBtn: document.getElementById("closeImageViewerBtn"),
      systemPrompt: document.getElementById("systemPrompt"),
      temperature: document.getElementById("temperature"),
      temperatureValue: document.getElementById("temperatureValue"),
      maxTokens: document.getElementById("maxTokens"),
      toast: document.getElementById("toast"),
      scrollTopBtn: document.getElementById("scrollTopBtn"),
      selectionAskBtn: document.getElementById("selectionAskBtn")
    };

    let state = loadState();
    let sidebarCollapsed = localStorage.getItem("ai-chat-sidebar-collapsed") === "true";
    const activeRequests = new Map();
    const assistantRenderQueue = new Map();
    let pendingAttachments = [];
    let imageControlsVisible = false;
    let imageModeActive = false;
    let thinkingTimer = null;
    let scrollFrame = null;
    let renderMessagesToken = 0;

    function uid() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID();
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function createSession(title = "新聊天") {
      const time = nowIso();
      return { id: uid(), title, messages: [], memorySummary: "", createdAt: time, updatedAt: time };
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (parsed && Array.isArray(parsed.sessions)) {
          const sessions = parsed.sessions.map(normalizeSession).filter(Boolean);
          if (sessions.length) {
            const settings = fillLocalProxySettings({ ...getDefaultSettings(), ...(parsed.settings || {}) });
            settings.apiKey = settings.apiKey || EMBEDDED_API_KEY;
            return {
              settings,
              sessions,
              currentSessionId: sessions.some(s => s.id === parsed.currentSessionId)
                ? parsed.currentSessionId
                : sessions[0].id
            };
          }
        }
      } catch (error) {
        console.warn(error);
      }
      const first = createSession();
      return {
        settings: { ...getDefaultSettings(), apiKey: EMBEDDED_API_KEY },
        sessions: [first],
        currentSessionId: first.id
      };
    }

    function normalizeSession(input) {
      if (!input || typeof input !== "object") return null;
      const id = String(input.id || uid());
      const messages = Array.isArray(input.messages)
        ? input.messages
            .filter(m => m && ["user", "assistant", "system"].includes(m.role))
            .map(m => ({
              id: String(m.id || uid()),
              role: m.role,
              content: String(m.content || ""),
              attachments: Array.isArray(m.attachments) ? m.attachments : [],
              createdAt: String(m.createdAt || nowIso()),
              textGenerating: false,
              thinkingStartedAt: Number(m.thinkingStartedAt || 0),
              thinkingFinishedAt: Number(m.thinkingFinishedAt || 0),
              thinkingElapsedMs: Number(m.thinkingElapsedMs || 0),
              imageGenerating: Boolean(m.imageGenerating),
              imageStartedAt: Number(m.imageStartedAt || 0),
              imageFinishedAt: Number(m.imageFinishedAt || 0),
              imageElapsedMs: Number(m.imageElapsedMs || 0)
            }))
        : [];
      return {
        id,
        title: String(input.title || titleFromMessages(messages) || "新聊天"),
        messages,
        memorySummary: String(input.memorySummary || ""),
        createdAt: String(input.createdAt || nowIso()),
        updatedAt: String(input.updatedAt || input.createdAt || nowIso())
      };
    }

    function saveState() {
      const persistedSessions = state.sessions.filter(session => session.messages.length > 0);
      const snapshot = {
        ...state,
        sessions: persistedSessions.map(prepareSessionForStorage),
        currentSessionId: persistedSessions.some(s => s.id === state.currentSessionId)
          ? state.currentSessionId
          : (persistedSessions[0]?.id || null)
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
      } catch (error) {
        try {
          const lightSnapshot = {
            ...snapshot,
            sessions: snapshot.sessions.map(stripLargeImageDataFromSession)
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(lightSnapshot));
        } catch (fallbackError) {
          console.warn("无法保存聊天历史", fallbackError);
        }
      }
    }

    function prepareSessionForStorage(session) {
      return {
        ...session,
        messages: session.messages.map(message => ({
          ...message,
          imageGenerating: false,
          textGenerating: false,
          displayContent: undefined
        }))
      };
    }

    function stripLargeImageDataFromSession(session) {
      return {
        ...session,
        messages: session.messages.map(message => ({
          ...message,
          attachments: (message.attachments || []).map(attachment => {
            if (attachment.kind !== "image" || !attachment.dataUrl || attachment.dataUrl.length < 200000) {
              return attachment;
            }
            return {
              ...attachment,
              dataUrl: ""
            };
          })
        }))
      };
    }

    function openImageDb() {
      return new Promise((resolve, reject) => {
        if (!("indexedDB" in window)) {
          reject(new Error("IndexedDB is not available"));
          return;
        }
        const request = indexedDB.open(IMAGE_DB_NAME, 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore(IMAGE_DB_STORE);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function putStoredImage(key, dataUrl) {
      if (!key || !dataUrl) return;
      const db = await openImageDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(IMAGE_DB_STORE, "readwrite");
        tx.objectStore(IMAGE_DB_STORE).put(dataUrl, key);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      db.close();
    }

    async function getStoredImage(key) {
      if (!key) return "";
      const db = await openImageDb();
      const value = await new Promise((resolve, reject) => {
        const tx = db.transaction(IMAGE_DB_STORE, "readonly");
        const request = tx.objectStore(IMAGE_DB_STORE).get(key);
        request.onsuccess = () => resolve(request.result || "");
        request.onerror = () => reject(request.error);
      });
      db.close();
      return value;
    }

    async function persistImageAttachment(attachment) {
      if (!attachment || attachment.kind !== "image" || !attachment.dataUrl) return attachment;
      attachment.storageKey = attachment.storageKey || uid();
      try {
        await putStoredImage(attachment.storageKey, attachment.dataUrl);
      } catch (error) {
        console.warn("鏃犳硶淇濆瓨鍥剧墖鍒?IndexedDB", error);
      }
      return attachment;
    }

    async function hydrateStoredImages() {
      let changed = false;
      for (const session of state.sessions) {
        for (const message of session.messages || []) {
          for (const attachment of message.attachments || []) {
            if (attachment.kind === "image" && attachment.storageKey && !attachment.dataUrl) {
              try {
                const dataUrl = await getStoredImage(attachment.storageKey);
                if (dataUrl) {
                  attachment.dataUrl = dataUrl;
                  changed = true;
                }
              } catch (error) {
                console.warn("鏃犳硶璇诲彇鍘嗗彶鍥剧墖", error);
              }
            }
          }
        }
      }
      if (changed) renderAll();
    }

    function currentSession() {
      let session = state.sessions.find(s => s.id === state.currentSessionId);
      if (!session) {
        session = createSession();
        state.sessions.unshift(session);
        state.currentSessionId = session.id;
      }
      return session;
    }

    function titleFromMessages(messages) {
      const firstUser = messages.find(m => m.role === "user");
      if (!firstUser) return "";
      return firstUser.content.trim().replace(/\s+/g, " ").slice(0, 32) || "新聊天";
    }

    function renderAll() {
      renderSessions();
      renderMessages();
      updateHeader();
      updateSendButton();
      updateImageSizeButtons();
      updateEmptyChatLayout();
    }

    function updateEmptyChatLayout() {
      const session = currentSession();
      document.querySelector(".main").classList.toggle("empty-chat", !session || session.messages.length === 0);
    }

    function renderSessions() {
      els.sessionList.innerHTML = "";
      const query = (els.sessionSearch?.value || "").trim().toLowerCase();
      const visibleSessions = state.sessions.filter(session => session.messages.length > 0);
      const ordered = [...visibleSessions].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      const filtered = query
        ? ordered.filter(session => sessionMatchesQuery(session, query))
        : ordered;
      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-sessions";
        empty.textContent = query ? "没有找到匹配的会话" : "暂无历史会话";
        els.sessionList.append(empty);
        return;
      }
      filtered.forEach(session => {
        const row = document.createElement("div");
        row.className = [
          "session",
          session.id === state.currentSessionId ? "active" : "",
          isSessionGenerating(session.id) ? "generating" : ""
        ].filter(Boolean).join(" ");
        row.title = session.title;
        row.dataset.id = session.id;

        const title = document.createElement("button");
        title.className = "session-title";
        title.textContent = session.title || "新聊天";
        title.addEventListener("click", () => switchSession(session.id));

        const rename = document.createElement("button");
        rename.className = "rename-session";
        rename.title = "重命名会话";
        rename.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
        rename.addEventListener("click", event => {
          event.stopPropagation();
          startRenameSession(row, session);
        });

        const del = document.createElement("button");
        del.className = "delete-session";
        del.title = "删除会话";
        del.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
        del.addEventListener("click", event => {
          event.stopPropagation();
          showDeleteConfirm(row, session);
        });

        row.append(title, rename, del);
        els.sessionList.append(row);
      });
    }

    function startRenameSession(row, session) {
      els.sessionList.querySelectorAll(".delete-confirm").forEach(node => node.remove());
      const existingTitle = row.querySelector(".session-title");
      if (!existingTitle) return;
      const input = document.createElement("input");
      input.className = "rename-input";
      input.value = session.title || "新聊天";
      existingTitle.replaceWith(input);
      input.focus();
      input.select();

      const commit = () => {
        const nextTitle = input.value.trim();
        if (nextTitle) {
          session.title = nextTitle.slice(0, 80);
          session.updatedAt = nowIso();
          saveState();
        }
        renderSessions();
        updateHeader();
      };

      input.addEventListener("keydown", event => {
        if (event.key === "Enter") commit();
        if (event.key === "Escape") renderSessions();
      });
      input.addEventListener("blur", commit, { once: true });
    }

    function showDeleteConfirm(row, session) {
      els.sessionList.querySelectorAll(".delete-confirm").forEach(node => node.remove());
      const popover = document.createElement("div");
      popover.className = "delete-confirm";
      popover.innerHTML = `
        <div class="delete-confirm-text">删除这个对话？</div>
        <div class="delete-confirm-actions">
          <button class="delete-cancel" type="button">取消</button>
          <button class="delete-ok" type="button">删除</button>
        </div>
      `;
      popover.querySelector(".delete-cancel").addEventListener("click", event => {
        event.stopPropagation();
        popover.remove();
      });
      popover.querySelector(".delete-ok").addEventListener("click", event => {
        event.stopPropagation();
        deleteSession(session.id);
      });
      row.append(popover);
    }

    function sessionMatchesQuery(session, query) {
      const normalized = query.toLowerCase();
      if (String(session.title || "").toLowerCase().includes(normalized)) return true;
      if (formatDate(session.createdAt).toLowerCase().includes(normalized)) return true;
      if (formatDate(session.updatedAt).toLowerCase().includes(normalized)) return true;
      return session.messages.some(m => {
        const content = normalizeMessageContent(m.content).slice(0, 2000).toLowerCase();
        return `${m.role} ${content}`.includes(normalized);
      });
    }

    function renderMessages() {
      const token = ++renderMessagesToken;
      clearAssistantRenderQueue();
      const session = currentSession();
      els.messages.innerHTML = "";
      if (!session || session.messages.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = `<h1>What are you working on?</h1>`;
        els.messages.append(empty);
        return;
      }

      const messages = session.messages.slice();
      let index = 0;
      const renderBatch = () => {
        if (token !== renderMessagesToken) return;
        const limit = Math.min(index + 12, messages.length);
        for (; index < limit; index += 1) {
          appendMessageRow(messages[index], session.id);
        }
        if (index < messages.length) {
          requestAnimationFrame(renderBatch);
          return;
        }
        scrollToBottom();
      };
      renderBatch();
    }

    function appendMessageRow(message, sessionId) {
        const row = document.createElement("article");
        row.className = "message-row " + message.role;
        const time = document.createElement("div");
        time.className = "message-time";
        time.textContent = `${message.role === "user" ? "我" : "AI"} · ${formatMessageTime(message.createdAt)}`;
        const inner = document.createElement("div");
        inner.className = "message-inner";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        const visibleContent = getVisibleMessageContent(message);
        setBubbleContent(bubble, visibleContent, shouldUsePlainMessageRender(message, sessionId, visibleContent));
        const thinkingStatus = renderTextThinkingStatus(message, sessionId);
        if (thinkingStatus && !normalizeMessageContent(visibleContent).trim()) {
          bubble.classList.add("empty-bubble");
        }
        const copyButton = createMessageCopyButton(message);
        const attachments = renderMessageAttachments(message.attachments || []);
        const imageStatus = renderImageGenerationStatus(message, sessionId);
        const imageGenerating = message.imageGenerating && isSessionGenerating(sessionId)
          ? renderImageGeneratingVisual()
          : null;
        inner.append(bubble);
        inner.append(copyButton);
        if (thinkingStatus) inner.append(thinkingStatus);
        if (imageGenerating) inner.append(imageGenerating);
        if (imageStatus) inner.append(imageStatus);
        if (attachments) inner.append(attachments);
        row.append(time);
        row.append(inner);
        els.messages.append(row);
    }

    function clearAssistantRenderQueue() {
      assistantRenderQueue.forEach(entry => {
        if (entry.timer) window.clearTimeout(entry.timer);
      });
      assistantRenderQueue.clear();
    }

    function renderContent(value) {
      const source = normalizeMessageContent(value).replace(/\r\n/g, "\n");
      if (!source.trim()) return "";
      if (source.length > 14000) return `<p>${escapeHtml(source).replace(/\n/g, "<br>")}</p>`;
      return parseFencedMarkdown(source).flatMap(part => {
        if (part.type === "text") return splitLooseCodeParts(part.text);
        return [part];
      }).map(part => {
        if (part.type === "code") return renderCodeBlock(part.code, part.language);
        return renderMarkdownBlocks(part.text);
      }).join("");
    }

    function setBubbleContent(bubble, content, plain = false) {
      const normalized = normalizeMessageContent(content);
      if (plain) {
        bubble.textContent = normalized;
      } else {
        bubble.innerHTML = renderContent(normalized);
      }
      bubble.classList.toggle("streaming-plain", plain);
    }

    function getVisibleMessageContent(message) {
      return typeof message.displayContent === "string" ? message.displayContent : message.content;
    }

    function shouldUsePlainMessageRender(message, sessionId, visibleContent = message.content) {
      const length = normalizeMessageContent(visibleContent).length;
      if (length > 14000) return true;
      return message.role === "assistant" && isSessionGenerating(sessionId) && length > 6000;
    }

    function createMessageCopyButton(message) {
      const button = document.createElement("button");
      button.className = "message-copy-btn";
      button.type = "button";
      button.dataset.messageId = message.id;
      button.title = "复制整段";
      button.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>复制</span>';
      return button;
    }

    function renderMessageAttachments(attachments) {
      if (!Array.isArray(attachments) || attachments.length === 0) return null;
      const wrap = document.createElement("div");
      wrap.className = "message-attachments";
      attachments.forEach(attachment => {
        const item = document.createElement("div");
        item.className = "message-attachment " + (attachment.kind === "image" ? "image" : "file");
        if (attachment.kind === "image" && attachment.dataUrl) {
          const img = document.createElement("img");
          img.src = attachment.dataUrl;
          img.alt = attachment.name || "uploaded image";
          item.append(createImagePreviewButton(img, attachment.dataUrl));
          item.append(createImageDownloadButton(attachment.dataUrl, attachment.name));
        } else if (attachment.kind === "image" && attachment.url) {
          const img = document.createElement("img");
          img.src = attachment.url;
          img.alt = attachment.name || "generated image";
          item.append(createImagePreviewButton(img, attachment.url));
          item.append(createImageDownloadButton(attachment.url, attachment.name));
        } else {
          item.innerHTML = `<div class="attachment-thumb"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div><span>${escapeHtml(attachment.name || "文件")}</span>`;
        }
        wrap.append(item);
      });
      return wrap;
    }

    function renderImageGeneratingVisual() {
      const visual = document.createElement("div");
      visual.className = "image-generate-visual";
      visual.setAttribute("aria-label", "正在生成图片");
      visual.innerHTML = '<span class="image-generate-dot"></span><span class="image-generate-dot"></span><span class="image-generate-dot"></span>';
      return visual;
    }

    function renderTextThinkingStatus(message, sessionId) {
      if (message.role !== "assistant" || message.imageGenerating) return null;
      const active = message.textGenerating && isSessionGenerating(sessionId);
      const elapsedMs = active ? getThinkingElapsedMs(message) : Number(message.thinkingElapsedMs || 0);
      if (!active && elapsedMs <= 0) return null;
      const status = document.createElement("div");
      status.className = "thinking-status " + (active ? "active" : "finished");
      status.dataset.messageId = message.id;
      status.dataset.startedAt = String(message.thinkingStartedAt || "");
      status.innerHTML = active
        ? `<span>思考中 · <span class="thinking-elapsed">${formatThinkingDuration(elapsedMs)}</span></span>`
        : `<span>思考用时 ${formatThinkingDuration(elapsedMs)}</span>`;
      return status;
    }

    function renderImageGenerationStatus(message, sessionId) {
      if (message.role !== "assistant") return null;
      const active = message.imageGenerating && isSessionGenerating(sessionId);
      const elapsedMs = active ? getImageElapsedMs(message) : Number(message.imageElapsedMs || 0);
      if (!active && elapsedMs <= 0) return null;
      const status = document.createElement("div");
      status.className = "thinking-status image-time-status " + (active ? "active" : "finished");
      status.dataset.messageId = message.id;
      status.dataset.timerKind = "image";
      status.innerHTML = active
        ? `<span>生成中 · <span class="thinking-elapsed">${formatThinkingDuration(elapsedMs)}</span></span>`
        : `<span>用时 ${formatThinkingDuration(elapsedMs)}</span>`;
      return status;
    }

    function createImagePreviewButton(img, src) {
      const button = document.createElement("button");
      button.className = "image-preview-btn";
      button.type = "button";
      button.title = "查看图片";
      button.append(img);
      button.addEventListener("click", () => openImageViewer(src));
      return button;
    }

    function createImageDownloadButton(src, filename = "") {
      const button = document.createElement("button");
      button.className = "image-download-btn";
      button.type = "button";
      button.title = "下载图片";
      button.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg><span>下载图片</span>';
      button.addEventListener("click", event => {
        event.stopPropagation();
        downloadImage(src, filename || timestampImageFilename());
      });
      return button;
    }

    function parseFencedMarkdown(source) {
      const lines = source.split("\n");
      const parts = [];
      let text = [];
      let code = [];
      let language = "";
      let inFence = false;

      for (const line of lines) {
        const fence = line.match(/^\s*```+\s*([^`]*)$/);
        if (fence) {
          if (inFence) {
            parts.push({ type: "code", language, code: code.join("\n") });
            code = [];
            language = "";
            inFence = false;
          } else {
            if (text.length) {
              parts.push({ type: "text", text: text.join("\n") });
              text = [];
            }
            language = (fence[1] || "").trim();
            inFence = true;
          }
          continue;
        }

        if (inFence) code.push(line);
        else text.push(line);
      }

      if (inFence) parts.push({ type: "code", language, code: code.join("\n") });
      if (text.length) parts.push({ type: "text", text: text.join("\n") });
      return parts;
    }

    function splitLooseCodeParts(text) {
      const lines = text.split("\n");
      const parts = [];
      let buffer = [];
      let code = [];

      const flushText = () => {
        if (buffer.length) {
          parts.push({ type: "text", text: buffer.join("\n") });
          buffer = [];
        }
      };
      const flushCode = () => {
        if (code.length) {
          parts.push({
            type: "code",
            language: inferCodeLanguage(code.join("\n")),
            code: code.join("\n").replace(/^\n+|\n+$/g, "")
          });
          code = [];
        }
      };

      lines.forEach((line, index) => {
        const previous = lines[index - 1] || "";
        const next = lines[index + 1] || "";
        const codeLine = looksLikeLooseCodeLine(line);
        const nearCode = looksLikeLooseCodeLine(previous) || looksLikeLooseCodeLine(next);
        const startsSnippet = /[:：]\s*$/.test(previous.trim()) && codeLine;

        if (codeLine && (nearCode || startsSnippet || /^\s{4,}\S/.test(line))) {
          flushText();
          code.push(line);
          return;
        }

        if (code.length && !line.trim()) {
          code.push(line);
          return;
        }

        flushCode();
        buffer.push(line);
      });

      flushCode();
      flushText();
      return parts;
    }

    function looksLikeLooseCodeLine(line) {
      const value = line.trim();
      if (!value) return false;
      if (/^(#{1,3}|[-*+]\s|\d+[.)]\s|>\s|\|)/.test(value)) return false;
      return /^\s{4,}\S/.test(line)
        || /^(const|let|var|function|class|import|export|async|await|return|if|else|for|while|try|catch)\b/.test(value)
        || /^(def|class|from|import|print|if|elif|else|for|while|try|except|return)\b/.test(value)
        || /^(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP)\b/i.test(value)
        || /^(npm|pnpm|yarn|node|python|pip|git|curl|cd|mkdir|copy|dir|setx|powershell)\b/i.test(value)
        || /^[$>]\s+\S/.test(value)
        || /^<\/?[A-Za-z][^>]*>$/.test(value)
        || /^[\w.#-]+\s*\{/.test(value)
        || /^[}\])];,]+$/.test(value)
        || /[{};]\s*$/.test(value)
        || /^[\w$.[\]'"]+\s*[:=]\s*.+[,;]?$/.test(value);
    }

    function inferCodeLanguage(code) {
      const value = code.trim();
      if (/^<\/?[A-Za-z][^>]*>/m.test(value)) return "html";
      if (/\b(const|let|function|=>|console\.log|document\.)\b/.test(value)) return "javascript";
      if (/\b(def|print|self|elif|except)\b/.test(value)) return "python";
      if (/\b(SELECT|INSERT|UPDATE|DELETE|CREATE)\b/i.test(value)) return "sql";
      if (/^(npm|pnpm|yarn|node|python|pip|git|curl|cd|mkdir|copy|dir|setx|powershell)\b/im.test(value)) return "sh";
      if (/^\s*[{[][\s\S]*[}\]]\s*$/.test(value)) return "json";
      return "";
    }

    function renderCodeBlock(code, language) {
      const lang = normalizeCodeLanguage(language);
      const raw = stripOddControlChars(code || "").replace(/\n+$/, "");
      const encoded = encodeURIComponent(raw);
      return [
        `<div class="code-block" data-code="${encoded}">`,
        '<div class="code-head">',
        `<div class="code-lang"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></svg><span>${escapeHtml(lang.label)}</span></div>`,
        '<button class="code-copy" type="button" title="澶嶅埗浠ｇ爜"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>',
        '</div>',
        `<pre><code>${highlightCode(raw, lang.key)}</code></pre>`,
        '</div>'
      ].join("");
    }

    function normalizeCodeLanguage(language) {
      const raw = String(language || "").trim();
      const key = raw.toLowerCase();
      const labels = {
        js: "JavaScript",
        javascript: "JavaScript",
        ts: "TypeScript",
        typescript: "TypeScript",
        py: "Python",
        python: "Python",
        ps1: "PowerShell",
        powershell: "PowerShell",
        sh: "Shell",
        bash: "Shell",
        json: "JSON",
        html: "HTML",
        css: "CSS",
        toml: "TOML",
        sql: "SQL"
      };
      return { key, label: labels[key] || raw || "Code" };
    }

    function highlightCode(code, language) {
      const placeholders = [];
      let html = escapeHtml(code);
      html = html.replace(/(&quot;.*?&quot;|&#039;.*?&#039;|`.*?`)/g, match => storeToken(placeholders, "string", match));
      html = html.replace(/(#.*$|\/\/.*$|&lt;!--[\s\S]*?--&gt;)/gm, match => storeToken(placeholders, "comment", match));
      html = html.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-number">$1</span>');
      if (language === "powershell" || language === "ps1") {
        html = html.replace(/(\$[A-Za-z_][\w:]*)/g, '<span class="tok-variable">$1</span>');
        html = html.replace(/\b(setx|echo|cd|dir|copy|node|npm|codex|powershell)\b/gi, '<span class="tok-builtin">$1</span>');
      } else {
        html = html.replace(/\b(const|let|var|function|return|async|await|if|else|for|while|class|import|from|export|try|catch|new|true|false|null|undefined|def|print|in|and|or|not|with|as|SELECT|FROM|WHERE|INSERT|UPDATE|DELETE|CREATE|model|model_provider|base_url|env_key|wire_api|name)\b/g, '<span class="tok-keyword">$1</span>');
      }
      return restoreTokens(html, placeholders);
    }

    function storeToken(placeholders, type, value) {
      const key = tokenKey(placeholders.length);
      placeholders.push({ key, html: `<span class="tok-${type}">${value}</span>` });
      return `@@TOKEN_${key}@@`;
    }

    function restoreTokens(html, placeholders) {
      return placeholders.reduce((output, item) => output.replaceAll(`@@TOKEN_${item.key}@@`, item.html), html);
    }

    function tokenKey(index) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      let n = index;
      let key = "";
      do {
        key = alphabet[n % alphabet.length] + key;
        n = Math.floor(n / alphabet.length) - 1;
      } while (n >= 0);
      return key;
    }

    function normalizeMessageContent(value) {
      if (value == null) return "";
      if (typeof value === "string") return stripOddControlChars(value);
      if (Array.isArray(value)) return stripOddControlChars(value.map(normalizeMessageContent).join(""));
      if (typeof value === "object") {
        if (typeof value.text === "string") return stripOddControlChars(value.text);
        if (typeof value.content === "string") return stripOddControlChars(value.content);
        if (Array.isArray(value.content)) return normalizeMessageContent(value.content);
        return stripOddControlChars(JSON.stringify(value, null, 2));
      }
      return stripOddControlChars(String(value));
    }

    function stripOddControlChars(value) {
      return String(value).replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, "");
    }

    function renderMarkdownBlocks(markdown) {
      const lines = markdown.split("\n");
      const html = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (!line.trim()) {
          i += 1;
          continue;
        }
        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
          html.push(`<h${heading[1].length}>${renderInline(heading[2])}</h${heading[1].length}>`);
          i += 1;
          continue;
        }
        if (/^\s*---+\s*$/.test(line)) {
          html.push("<hr>");
          i += 1;
          continue;
        }
        if (looksLikeTable(lines, i)) {
          const rows = [];
          rows.push(splitTableRow(lines[i]));
          i += 2;
          while (i < lines.length && lines[i].includes("|") && lines[i].trim()) {
            rows.push(splitTableRow(lines[i]));
            i += 1;
          }
          html.push(renderTable(rows));
          continue;
        }
        if (/^\s*>\s?/.test(line)) {
          const quote = [];
          while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
            quote.push(lines[i].replace(/^\s*>\s?/, ""));
            i += 1;
          }
          html.push(`<blockquote>${renderMarkdownBlocks(quote.join("\n"))}</blockquote>`);
          continue;
        }
        const listMatch = line.match(/^\s*((?:[-*+])|(?:\d+[.)]))\s+(.+)$/);
        if (listMatch) {
          const ordered = /\d/.test(listMatch[1]);
          const tag = ordered ? "ol" : "ul";
          const items = [];
          while (i < lines.length) {
            const item = lines[i].match(/^\s*((?:[-*+])|(?:\d+[.)]))\s+(.+)$/);
            if (!item || /\d/.test(item[1]) !== ordered) break;
            items.push(`<li>${renderInline(item[2])}</li>`);
            i += 1;
          }
          html.push(`<${tag}>${items.join("")}</${tag}>`);
          continue;
        }
        const paragraph = [];
        while (i < lines.length && lines[i].trim() && !isBlockStart(lines, i)) {
          paragraph.push(lines[i]);
          i += 1;
        }
        html.push(`<p>${renderInline(paragraph.join("\n")).replace(/\n/g, "<br>")}</p>`);
      }
      return html.join("");
    }

    function isBlockStart(lines, index) {
      const line = lines[index];
      return /^(#{1,3})\s+/.test(line)
        || /^\s*---+\s*$/.test(line)
        || /^\s*>\s?/.test(line)
        || /^\s*((?:[-*+])|(?:\d+[.)]))\s+/.test(line)
        || looksLikeTable(lines, index);
    }

    function renderInline(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/__([^_]+)__/g, "<strong>$1</strong>");
      html = html.replace(/(^|[\s(])\*([^*\n]+)\*/g, "$1<em>$2</em>");
      return html;
    }

    function looksLikeTable(lines, index) {
      return Boolean(lines[index] && lines[index].includes("|") && isTableSeparator(lines[index + 1] || ""));
    }

    function isTableSeparator(line) {
      return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
    }

    function splitTableRow(line) {
      return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(cell => cell.trim());
    }

    function renderTable(rows) {
      if (!rows.length) return "";
      const head = rows[0].map(cell => `<th>${renderInline(cell)}</th>`).join("");
      const body = rows.slice(1).map(row => `<tr>${row.map(cell => `<td>${renderInline(cell)}</td>`).join("")}</tr>`).join("");
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateHeader() {
      const session = currentSession();
      document.title = "童博GPT";
      els.currentTitle.textContent = "ChatGPT";
      els.modelPill.textContent = "";
      els.app.classList.toggle("sidebar-collapsed", sidebarCollapsed);
      updateModeButtons();
    }

    function updateSendButton() {
      const hasText = els.promptInput.value.trim().length > 0;
      const hasAttachment = pendingAttachments.length > 0;
      const sending = isSessionGenerating(state.currentSessionId);
      els.sendBtn.disabled = !sending && !hasText && !hasAttachment;
      els.sendBtn.title = sending ? "停止生成" : "发送";
      els.sendIcon.innerHTML = sending
        ? '<path d="M7 7h10v10H7z"/>'
        : '<path d="M12 19V5"/><path d="M5 12l7-7 7 7"/>';
      els.generateImageBtn.disabled = sending;
      els.generateImageBtn.title = sending ? "当前会话正在生成" : "切换图片生成模式";
    }

    function isSessionGenerating(sessionId) {
      return Boolean(sessionId && activeRequests.has(sessionId));
    }

    function nowMs() {
      return Date.now();
    }

    function getThinkingElapsedMs(message) {
      const startedAt = Number(message?.thinkingStartedAt || 0);
      if (!startedAt) return Number(message?.thinkingElapsedMs || 0);
      const finishedAt = Number(message?.thinkingFinishedAt || 0);
      return Math.max(0, (finishedAt || nowMs()) - startedAt);
    }

    function finishThinking(message) {
      if (!message || !message.textGenerating) return;
      const finishedAt = nowMs();
      message.textGenerating = false;
      message.thinkingFinishedAt = finishedAt;
      message.thinkingElapsedMs = getThinkingElapsedMs(message);
    }

    function getImageElapsedMs(message) {
      const startedAt = Number(message?.imageStartedAt || 0);
      if (!startedAt) return Number(message?.imageElapsedMs || 0);
      const finishedAt = Number(message?.imageFinishedAt || 0);
      return Math.max(0, (finishedAt || nowMs()) - startedAt);
    }

    function finishImageGeneration(message) {
      if (!message || !message.imageGenerating) return;
      const finishedAt = nowMs();
      message.imageGenerating = false;
      message.imageFinishedAt = finishedAt;
      message.imageElapsedMs = getImageElapsedMs(message);
    }

    function formatThinkingDuration(ms) {
      const seconds = Math.max(0, Number(ms || 0) / 1000);
      if (seconds < 60) return `${seconds.toFixed(1)} 秒`;
      const minutes = Math.floor(seconds / 60);
      const rest = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${minutes}:${rest}`;
    }

    function getThinkingMode() {
      return MODE_CONFIG[state.settings.thinkingMode] ? state.settings.thinkingMode : "standard";
    }

    function setThinkingMode(mode) {
      if (!MODE_CONFIG[mode]) return;
      state.settings.thinkingMode = mode;
      saveState();
      updateHeader();
      toast(`已切换到${MODE_CONFIG[mode].label}`);
    }

    function normalizeImageSize(size) {
      const value = String(size || "auto").trim();
      const legacy = {
        "1024x1024": "square",
        "1024x1536": "portrait",
        "1536x1024": "landscape"
      };
      if (legacy[value]) return legacy[value];
      return IMAGE_SIZE_OPTIONS[value] ? value : "auto";
    }

    function setImageSize(size) {
      state.settings.imageSize = normalizeImageSize(size);
      saveState();
      updateImageSizeButtons();
    }

    function updateImageSizeButtons() {
      const size = normalizeImageSize(state.settings.imageSize);
      state.settings.imageSize = size;
      els.imageSizeLabel.textContent = IMAGE_SIZE_OPTIONS[size];
      els.generateImageBtn.classList.toggle("active", imageModeActive);
      els.imageSizeBtn.classList.toggle("visible", imageControlsVisible);
      els.imageSizeMenu.querySelectorAll(".image-size-option").forEach(option => {
        const active = option.dataset.size === size;
        option.classList.toggle("active", active);
        const marker = option.querySelector(".check");
        if (marker) marker.textContent = active ? "✓" : "";
      });
    }

    function showImageControls() {
      imageControlsVisible = true;
      updateImageSizeButtons();
    }

    function toggleImageMode() {
      imageModeActive = !imageModeActive;
      imageControlsVisible = imageModeActive;
      toggleImageSizeMenu(false);
      updateImageSizeButtons();
    }

    function toggleImageSizeMenu(force) {
      const open = typeof force === "boolean" ? force : !els.imageSizeMenu.classList.contains("open");
      els.imageSizeMenu.classList.toggle("open", open);
      els.imageSizeBtn.setAttribute("aria-expanded", String(open));
      if (open) positionToolMenu(els.imageSizeMenu, els.imageSizeBtn);
    }

    function positionToolMenu(menu, button) {
      const tools = button.closest(".composer-tools");
      if (!tools || !menu) return;
      const toolsRect = tools.getBoundingClientRect();
      const buttonRect = button.getBoundingClientRect();
      const menuWidth = menu.offsetWidth || 0;
      const rawLeft = buttonRect.left - toolsRect.left;
      const maxLeft = Math.max(0, toolsRect.width - menuWidth);
      menu.style.left = Math.min(Math.max(0, rawLeft), maxLeft) + "px";
    }

    function updateModeButtons() {
      const mode = getThinkingMode();
      els.thinkingModeLabel.textContent = mode === "deep" ? "Deep thinking" : "Thinking";
      els.thinkingModeMenu.querySelectorAll(".mode-option").forEach(option => {
        const active = option.dataset.mode === mode;
        option.classList.toggle("active", active);
        const marker = option.querySelector("span");
        if (marker) marker.textContent = active ? "✓" : "";
      });
    }

    function switchSession(id) {
      state.currentSessionId = id;
      saveState();
      renderAll();
      closeMobileSidebar();
    }

    function deleteSession(id) {
      const session = state.sessions.find(s => s.id === id);
      if (!session) return;
      stopGeneration(id);
      activeRequests.delete(id);
      updateThinkingTimer();
      state.sessions = state.sessions.filter(s => s.id !== id);
      if (state.currentSessionId === id) {
        const next = state.sessions.find(s => s.messages.length > 0) || createSession();
        if (!state.sessions.some(s => s.id === next.id)) state.sessions.unshift(next);
        state.currentSessionId = next.id;
      }
      saveState();
      renderAll();
      toast("已删除会话");
    }

    function newChat() {
      const active = currentSession();
      if (active && active.messages.length === 0) {
        state.currentSessionId = active.id;
        renderAll();
        closeMobileSidebar();
        els.promptInput.focus();
        return;
      }
      const session = createSession();
      state.sessions.unshift(session);
      state.currentSessionId = session.id;
      renderAll();
      closeMobileSidebar();
      els.promptInput.focus();
    }

    function resizeInput() {
      els.promptInput.style.height = "auto";
      els.promptInput.style.height = Math.min(els.promptInput.scrollHeight, 220) + "px";
      updateSendButton();
    }

    function scrollToBottom() {
      if (scrollFrame) return;
      requestAnimationFrame(() => {
        scrollFrame = null;
        els.messages.scrollTop = els.messages.scrollHeight;
        updateScrollTopButton();
      });
      scrollFrame = true;
    }

    function updateScrollTopButton() {
      els.scrollTopBtn.classList.toggle("show", els.messages.scrollTop > 420);
    }

    function selectedTextForAsk() {
      const selection = window.getSelection();
      const text = selection ? selection.toString().trim() : "";
      if (!selection || selection.rangeCount === 0 || text.length < 1) return null;
      const range = selection.getRangeAt(0);
      if (range.collapsed) return null;
      if (els.selectionAskBtn.contains(selection.anchorNode)) return null;
      const host = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
        ? range.commonAncestorContainer
        : range.commonAncestorContainer.parentElement;
      if (!host || !els.messages.contains(host)) return null;
      return { text, rect: range.getBoundingClientRect() };
    }

    function updateSelectionAskButton() {
      const selected = selectedTextForAsk();
      if (!selected || !selected.rect || selected.rect.width === 0 || selected.rect.height === 0) {
        hideSelectionAskButton();
        return;
      }
      const top = Math.max(10, selected.rect.top - 58);
      const left = clamp(selected.rect.left + selected.rect.width / 2 - 86, 10, window.innerWidth - 190);
      els.selectionAskBtn.style.left = `${left}px`;
      els.selectionAskBtn.style.top = `${top}px`;
      els.selectionAskBtn.dataset.selectedText = selected.text.slice(0, 8000);
      els.selectionAskBtn.classList.add("show");
    }

    function hideSelectionAskButton() {
      els.selectionAskBtn.classList.remove("show");
      els.selectionAskBtn.removeAttribute("data-selected-text");
    }

    function askAboutSelection() {
      const selected = els.selectionAskBtn.dataset.selectedText || selectedTextForAsk()?.text || "";
      if (!selected.trim()) return;
      const prompt = `请针对下面这段内容回答我的问题：\n\n${selected.trim()}\n\n我的问题：`;
      els.promptInput.value = prompt;
      resizeInput();
      hideSelectionAskButton();
      els.promptInput.focus();
      els.promptInput.setSelectionRange(els.promptInput.value.length, els.promptInput.value.length);
      scrollToBottom();
    }

    function openSettings() {
      applySettingsToForm(state.settings);
      els.settingsModal.classList.add("open");
    }

    function closeSettings() {
      els.settingsModal.classList.remove("open");
    }

    function applyPreset(value) {
      if (value === "openai") {
        els.baseUrl.value = "https://api.openai.com";
        els.apiPath.value = "/v1/chat/completions";
      } else if (value === "local") {
        els.baseUrl.value = "http://localhost:11434";
        els.apiPath.value = "/v1/chat/completions";
      } else if (value === "compatible") {
        els.apiPath.value = "/v1/chat/completions";
      } else {
        els.apiPath.value = els.apiPath.value || "/v1/chat/completions";
      }
    }

    function saveSettings() {
      state.settings = collectSettingsFromForm();
      saveState();
      updateHeader();
      closeSettings();
      toast("设置已保存");
    }

    function collectSettingsFromForm() {
      const temperature = clamp(Number(els.temperatureValue.value || els.temperature.value || 0.7), 0, 2);
      return {
        providerPreset: els.providerPreset.value,
        baseUrl: cleanBaseUrl(els.baseUrl.value),
        apiPath: cleanPath(els.apiPath.value),
        apiKey: els.apiKey.value.trim(),
        model: els.modelName.value.trim(),
        imageBaseUrl: cleanBaseUrl(els.imageBaseUrl.value),
        imageApiPath: cleanPath(els.imageApiPath.value || "/v1/images/generations"),
        imageApiKey: els.imageApiKey.value.trim(),
        imageModel: els.imageModel.value.trim() || "gpt-image-2",
        imageSize: normalizeImageSize(state.settings.imageSize),
        systemPrompt: els.systemPrompt.value,
        temperature,
        maxTokens: els.maxTokens.value.trim(),
        thinkingMode: getThinkingMode()
      };
    }

    function applySettingsToForm(settings) {
      const merged = { ...DEFAULT_SETTINGS, ...(settings || {}) };
      els.providerPreset.value = merged.providerPreset;
      els.baseUrl.value = merged.baseUrl;
      els.apiPath.value = merged.apiPath;
      els.apiKey.value = merged.apiKey;
      els.modelName.value = merged.model;
      els.imageBaseUrl.value = merged.imageBaseUrl || "";
      els.imageApiPath.value = merged.imageApiPath || "/v1/images/generations";
      els.imageApiKey.value = merged.imageApiKey || "";
      els.imageModel.value = merged.imageModel || "gpt-image-2";
      els.systemPrompt.value = merged.systemPrompt;
      els.temperature.value = merged.temperature;
      els.temperatureValue.value = merged.temperature;
      els.maxTokens.value = merged.maxTokens || "";
    }

    function cleanBaseUrl(url) {
      return (url || "").trim().replace(/\/+$/, "");
    }

    function cleanPath(path) {
      const value = (path || "/v1/chat/completions").trim();
      return value.startsWith("/") ? value : "/" + value;
    }

    function isResponsesEndpoint(path) {
      return /\/responses\/?$/.test(cleanPath(path));
    }

    function isAskEndpoint(path) {
      return cleanPath(path) === "/api/ask";
    }

    function clamp(value, min, max) {
      if (Number.isNaN(value)) return min;
      return Math.min(max, Math.max(min, value));
    }

    async function submitMessage(event) {
      event.preventDefault();
      if (imageModeActive) {
        await submitImageGeneration();
        return;
      }
      const session = currentSession();
      if (isSessionGenerating(session.id)) {
        stopGeneration(session.id);
        return;
      }
      const content = els.promptInput.value.trim();
      if (!content && pendingAttachments.length === 0) return;
      if (!state.settings.baseUrl || !state.settings.model) {
        openSettings();
        toast("请先填写 Base URL 和模型名");
        return;
      }

      const attachments = pendingAttachments;
      pendingAttachments = [];
      renderAttachments();
      const userContent = (content || "请查看附件。") + buildAttachmentText(attachments);
      const userMessage = { id: uid(), role: "user", content: userContent, attachments, createdAt: nowIso() };
      const assistantMessage = {
        id: uid(),
        role: "assistant",
        content: "",
        createdAt: nowIso(),
        textGenerating: true,
        thinkingStartedAt: nowMs(),
        thinkingFinishedAt: 0,
        thinkingElapsedMs: 0
      };
      session.messages.push(userMessage, assistantMessage);
      if (session.title === "新聊天") session.title = titleFromMessages(session.messages);
      session.updatedAt = nowIso();
      els.promptInput.value = "";
      resizeInput();
      saveState();
      setSessionSending(session.id, true);
      renderAll();

      try {
        await requestChatCompletion(session, assistantMessage);
        if (!assistantMessage.content.trim()) assistantMessage.content = "（没有收到内容）";
      } catch (error) {
        if (error.name === "AbortError") {
          assistantMessage.content += assistantMessage.content ? "\n\n[已停止]" : "[已停止]";
        } else {
          assistantMessage.content = formatRequestError(error, state.settings);
        }
      } finally {
        finishThinking(assistantMessage);
        setSessionSending(session.id, false);
        updateSessionMemory(session);
        session.updatedAt = nowIso();
        saveState();
        updateAssistantMessage(session.id, assistantMessage.id, assistantMessage.content);
      }
    }

    async function submitImageGeneration() {
      const session = currentSession();
      if (isSessionGenerating(session.id)) return;
      const prompt = cleanImagePrompt(els.promptInput.value);
      if (!prompt) return;
      if (!state.settings.imageBaseUrl || !state.settings.imageModel) {
        openSettings();
        toast("请先填写 Image Base URL 和 Image Model");
        return;
      }

      const userMessage = { id: uid(), role: "user", content: prompt, attachments: [], createdAt: nowIso() };
      const assistantMessage = {
        id: uid(),
        role: "assistant",
        content: "正在生成图片...",
        attachments: [],
        imageGenerating: true,
        imageStartedAt: nowMs(),
        imageFinishedAt: 0,
        imageElapsedMs: 0,
        createdAt: nowIso()
      };
      session.messages.push(userMessage, assistantMessage);
      if (session.title === "新聊天") session.title = titleFromMessages(session.messages);
      session.updatedAt = nowIso();
      els.promptInput.value = "";
      resizeInput();
      saveState();
      setSessionSending(session.id, true);
      renderAll();

      try {
        const image = await requestImageGeneration(prompt, session);
        assistantMessage.content = image.revisedPrompt ? `已生成图片。\n\n${image.revisedPrompt}` : "已生成图片。";
        assistantMessage.attachments = [{
          kind: "image",
          name: "",
          dataUrl: image.dataUrl || "",
          url: image.url || ""
        }];
        if (assistantMessage.attachments[0].dataUrl) {
          await persistImageAttachment(assistantMessage.attachments[0]);
        }
        renderAll();
      } catch (error) {
        if (error.name === "AbortError") {
          assistantMessage.content = "[已停止]";
        } else {
          assistantMessage.content = formatImageRequestError(error, imageRequestSettings());
        }
      } finally {
        finishImageGeneration(assistantMessage);
        setSessionSending(session.id, false);
        updateSessionMemory(session);
        session.updatedAt = nowIso();
        saveState();
        renderAll();
      }
    }

    function cleanImagePrompt(value) {
      return String(value || "")
        .trim()
        .replace(/^(?:(?:生成图片|生图|图片)\s*[：:]\s*)+/g, "")
        .trim();
    }

    async function requestImageGeneration(prompt, session) {
      const settings = imageRequestSettings();
      const request = activeRequests.get(session.id);
      const body = {
        model: settings.model,
        prompt,
        n: 1
      };
      if (settings.imageSize && settings.imageSize !== "auto") {
        body.size = IMAGE_SIZE_API_VALUES[settings.imageSize] || settings.imageSize;
      }
      const data = await postJson(settings.baseUrl + settings.apiPath, body, settings, request?.controller.signal);
      return extractGeneratedImage(data);
    }

    function imageRequestSettings() {
      return {
        baseUrl: cleanBaseUrl(state.settings.imageBaseUrl),
        apiPath: cleanPath(state.settings.imageApiPath || "/v1/images/generations"),
        apiKey: state.settings.imageApiKey || "",
        model: state.settings.imageModel || "gpt-image-2",
        imageSize: normalizeImageSize(state.settings.imageSize)
      };
    }

    function extractGeneratedImage(data) {
      const first = Array.isArray(data?.data) ? data.data[0] : null;
      const b64 = first?.b64_json || findStringField(data, "b64_json");
      const url = first?.url || findStringField(data, "url");
      const revisedPrompt = first?.revised_prompt || data?.revised_prompt || "";
      if (b64) return { dataUrl: b64.startsWith("data:") ? b64 : `data:image/png;base64,${b64}`, revisedPrompt };
      if (url) return { url, revisedPrompt };
      throw new Error("图片接口没有返回 b64_json 或 url。");
    }

    function formatImageRequestError(error, settings) {
      const message = error.message || String(error);
      const target = cleanBaseUrl(settings.baseUrl) + cleanPath(settings.apiPath);
      if (/No available compatible accounts/i.test(message)) {
        return [
          "生成图片请求失败：图片服务没有可用的兼容账号。",
          "",
          `目标地址：${target}`,
          `模型：${settings.model}`,
          "",
          "这通常不是前端请求格式问题，而是当前图片 API 源没有可用的 gpt-image-2 账号、额度、路由或权限。",
          "请在设置里确认 Image Base URL、Image API Key、Image API Path 和 Image Model 使用的是专门支持生图的服务。"
        ].join("\n");
      }
      if (/Upstream service temporarily unavailable|Bad Gateway|HTTP 502/i.test(message)) {
        return [
          "生成图片请求失败：图片上游服务暂时不可用。",
          "",
          `目标地址：${target}`,
          `模型：${settings.model}`,
          "",
          "请求已经走到专门的生图接口，但图片服务商当前返回 502。通常需要稍后重试，或更换可用的 Image Base URL / Image API Key。"
        ].join("\n");
      }
      return formatRequestError(error, settings);
    }

    function findStringField(value, key) {
      if (!value || typeof value !== "object") return "";
      if (typeof value[key] === "string" && value[key]) return value[key];
      if (Array.isArray(value)) {
        for (const item of value) {
          const found = findStringField(item, key);
          if (found) return found;
        }
        return "";
      }
      for (const item of Object.values(value)) {
        const found = findStringField(item, key);
        if (found) return found;
      }
      return "";
    }

    function updateSessionMemory(session) {
      const turns = session.messages
        .filter(m => (m.role === "user" || m.role === "assistant") && m.content.trim())
        .slice(-8);
      if (turns.length < 2) return;
      const facts = [];
      if (session.memorySummary) facts.push(session.memorySummary);
      turns.forEach(message => {
        const text = normalizeMessageContent(message.content)
          .replace(/\s+/g, " ")
          .trim();
        if (!text) return;
        const label = message.role === "user" ? "用户" : "AI";
        facts.push(`${label}: ${text.slice(0, 180)}`);
      });
      session.memorySummary = facts
        .join("；")
        .replace(/\s+/g, " ")
        .slice(-900);
    }

    async function requestChatCompletion(session, assistantMessage) {
      const settings = state.settings;
      const url = cleanBaseUrl(settings.baseUrl) + cleanPath(settings.apiPath);
      const mode = getThinkingMode();
      const config = MODE_CONFIG[mode];
      const request = activeRequests.get(session.id);
      const signal = request?.controller.signal;

      if (isAskEndpoint(settings.apiPath)) {
        await requestAskEndpoint(url, session, assistantMessage, mode, signal);
        return;
      }

      if (isResponsesEndpoint(settings.apiPath)) {
        await requestResponsesApi(url, session, assistantMessage, mode, signal);
        return;
      }

      const payloadMessages = [];
      const developerPrompt = buildDeveloperPrompt(settings.systemPrompt, config.developerPrompt);
      if (developerPrompt) {
        payloadMessages.push({ role: preferredInstructionRole(settings), content: developerPrompt });
      }
      if (session.memorySummary) {
        payloadMessages.push({
          role: preferredInstructionRole(settings),
          content: "历史摘要记忆（仅供参考，不要逐字复述）：\n" + session.memorySummary
        });
      }
      session.messages
        .filter(m => m.id !== assistantMessage.id && (m.role === "user" || m.role === "assistant"))
        .slice(-12)
        .forEach(m => payloadMessages.push(toApiMessage(m)));

      const body = {
        model: settings.model,
        messages: payloadMessages,
        temperature: Number(settings.temperature),
        stream: true
      };
      if (settings.maxTokens) body.max_tokens = Number(settings.maxTokens);

      const headers = { "Content-Type": "application/json" };
      if (settings.apiKey) headers.Authorization = "Bearer " + settings.apiKey;

      const response = await fetch(url, {
        method: "POST",
        headers,
        body: JSON.stringify(body),
        signal
      });

      if (!response.ok) {
        const text = await response.text().catch(() => "");
        if (response.status === 401 && /API_KEY_REQUIRED|api key is required|authorization/i.test(text) && !settings.apiKey) {
          throw new Error("HTTP 401 Unauthorized：当前没有可用 API Key。请打开设置填写第三方 API Key 并保存。");
        }
        throw new Error(`HTTP ${response.status} ${response.statusText}${text ? "：" + text.slice(0, 500) : ""}`);
      }

      const contentType = response.headers.get("content-type") || "";
      if (!response.body || !contentType.includes("text/event-stream")) {
        const data = await response.json();
        assistantMessage.content = extractFullContent(data);
        updateAssistantMessage(session.id, assistantMessage.id, assistantMessage.content);
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split(/\r?\n/);
        buffer = lines.pop() || "";
        for (const line of lines) {
          if (!line.startsWith("data:")) continue;
          const data = line.slice(5).trim();
          if (!data || data === "[DONE]") continue;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content
              ?? json.choices?.[0]?.message?.content
              ?? "";
            if (delta) {
              assistantMessage.content += normalizeMessageContent(delta);
              updateAssistantMessage(session.id, assistantMessage.id, assistantMessage.content);
            }
          } catch (error) {
            console.warn("无法解析流片段", error, data);
          }
        }
      }
    }

    async function requestAskEndpoint(url, session, assistantMessage, mode, signal) {
      const settings = state.settings;
      const lastUserMessage = [...session.messages].reverse().find(m => m.role === "user");
      const body = {
        message: lastUserMessage ? lastUserMessage.content : "",
        mode,
        model: settings.model,
        systemPrompt: settings.systemPrompt,
        memorySummary: session.memorySummary || "",
        temperature: Number(settings.temperature)
      };
      if (settings.maxTokens) body.maxTokens = Number(settings.maxTokens);
      const data = await postJson(url, body, settings, signal);
      assistantMessage.content = data.answer || extractFullContent(data);
      updateAssistantMessage(session.id, assistantMessage.id, assistantMessage.content);
    }

    async function requestResponsesApi(url, session, assistantMessage, mode, signal) {
      const settings = state.settings;
      const config = MODE_CONFIG[mode];
      const input = [];
      const developerPrompt = buildDeveloperPrompt(settings.systemPrompt, config.developerPrompt);
      if (developerPrompt) {
        input.push({ role: "developer", content: developerPrompt });
      }
      if (session.memorySummary) {
        input.push({
          role: "developer",
          content: "历史摘要记忆（仅供参考，不要逐字复述）：\n" + session.memorySummary
        });
      }
      session.messages
        .filter(m => m.id !== assistantMessage.id && (m.role === "user" || m.role === "assistant"))
        .slice(-12)
        .forEach(m => input.push(toApiMessage(m)));
      const body = {
        model: settings.model,
        reasoning: { effort: config.reasoningEffort },
        input
      };
      const data = await postJson(url, body, settings, signal);
      assistantMessage.content = extractFullContent(data);
      updateAssistantMessage(session.id, assistantMessage.id, assistantMessage.content);
    }

    async function postJson(url, body, settings, signal) {
      const headers = { "Content-Type": "application/json" };
      if (settings.apiKey) headers.Authorization = "Bearer " + settings.apiKey;
      const response = await fetch(url, {
        method: "POST",
        headers,
        body: JSON.stringify(body),
        signal
      });
      if (!response.ok) {
        const text = await response.text().catch(() => "");
        if (response.status === 401 && /API_KEY_REQUIRED|api key is required|authorization/i.test(text) && !settings.apiKey) {
          throw new Error("HTTP 401 Unauthorized：当前没有可用 API Key。请打开设置填写第三方 API Key 并保存。");
        }
        throw new Error(`HTTP ${response.status} ${response.statusText}${text ? "：" + text.slice(0, 500) : ""}`);
      }
      return response.json();
    }

    function buildDeveloperPrompt(systemPrompt, modePrompt) {
      const parts = [modePrompt];
      if (systemPrompt && systemPrompt.trim()) {
        parts.push("用户自定义 System Prompt：\n" + systemPrompt.trim());
      }
      return parts.filter(Boolean).join("\n\n");
    }

    function preferredInstructionRole(settings) {
      return settings.providerPreset === "openai" ? "developer" : "system";
    }

    function toApiMessage(message) {
      if (message.role !== "user" || !Array.isArray(message.attachments) || !message.attachments.some(item => item.kind === "image" && item.dataUrl)) {
        return { role: message.role, content: message.content };
      }
      const content = [{ type: "text", text: message.content }];
      message.attachments
        .filter(item => item.kind === "image" && item.dataUrl)
        .forEach(item => content.push({ type: "image_url", image_url: { url: item.dataUrl } }));
      return { role: "user", content };
    }

    function extractFullContent(data) {
      return normalizeMessageContent(data?.choices?.[0]?.message?.content
        || data?.choices?.[0]?.text
        || data?.output_text
        || "");
    }

    function formatRequestError(error, settings) {
      const message = error.message || String(error);
      const target = cleanBaseUrl(settings.baseUrl) + cleanPath(settings.apiPath);
      const looksLikeNetworkBlock = error instanceof TypeError
        || /failed to fetch|networkerror|load failed|fetch/i.test(message);
      if (looksLikeNetworkBlock) {
        return [
          "请求失败：浏览器没有拿到接口响应。",
          "",
          `目标地址：${target}`,
          "",
          "兼容模型常见原因：",
          "1. 兼容接口没有开启 CORS，file:// 页面被浏览器跨域拦截。",
          "2. Base URL 应只填域名和端口，不要重复带 /v1/chat/completions。",
          "3. 接口路径通常是 /v1/chat/completions。",
          "4. API Key、模型名、网络代理配置不正确，或第三方接口不允许浏览器 CORS 直连。",
          "",
          "请确认第三方 API 服务商支持浏览器跨域访问，并在设置里填写第三方接口的 Base URL、API Key 和模型名。"
        ].join("\n");
      }
      return "请求失败：" + message;
    }

    function updateAssistantMessage(sessionId, id, content, force = false) {
      const key = `${sessionId}:${id}`;
      const entry = assistantRenderQueue.get(key) || {
        sessionId,
        id,
        content: "",
        visibleLength: 0,
        timer: null,
        lastRenderedAt: 0
      };
      entry.content = content;
      assistantRenderQueue.set(key, entry);

      if (entry.timer) {
        window.clearTimeout(entry.timer);
        entry.timer = null;
      }
      if (force) {
        entry.visibleLength = normalizeMessageContent(entry.content).length;
        renderAssistantMessageNow(entry.sessionId, entry.id, entry.content);
        assistantRenderQueue.delete(key);
        return;
      }
      scheduleTypewriterStep(entry, 0);
    }

    function scheduleTypewriterStep(entry, delay) {
      entry.timer = window.setTimeout(() => runTypewriterStep(entry), delay);
    }

    function runTypewriterStep(entry) {
      entry.timer = null;
      const full = normalizeMessageContent(entry.content);
      if (entry.visibleLength > full.length) entry.visibleLength = full.length;
      if (entry.visibleLength >= full.length && isSessionGenerating(entry.sessionId)) {
        scheduleTypewriterStep(entry, 160);
        return;
      }
      entry.visibleLength = Math.min(full.length, entry.visibleLength + typewriterChunkSize(full));
      const visible = full.slice(0, entry.visibleLength);
      renderAssistantMessageNow(entry.sessionId, entry.id, visible);
      if (entry.visibleLength < full.length || isSessionGenerating(entry.sessionId)) {
        scheduleTypewriterStep(entry, typewriterDelayForContent(full));
      } else {
        assistantRenderQueue.delete(`${entry.sessionId}:${entry.id}`);
        const session = state.sessions.find(item => item.id === entry.sessionId);
        const message = session?.messages.find(item => item.id === entry.id);
        if (message) delete message.displayContent;
        renderAssistantMessageNow(entry.sessionId, entry.id, full);
      }
    }

    function typewriterChunkSize(content) {
      const length = normalizeMessageContent(content).length;
      if (length > 80000) return 260;
      if (length > 40000) return 180;
      if (length > 12000) return 110;
      if (length > 3000) return 64;
      return 28;
    }

    function typewriterDelayForContent(content) {
      const length = normalizeMessageContent(content).length;
      if (length > 40000) return 24;
      if (length > 12000) return 28;
      return 34;
    }

    function renderAssistantMessageNow(sessionId, id, visibleContent) {
      const session = state.sessions.find(item => item.id === sessionId);
      if (!session) return;
      if (state.currentSessionId !== sessionId) {
        renderSessions();
        return;
      }
      const rows = els.messages.querySelectorAll(".message-row");
      const index = session.messages.findIndex(m => m.id === id);
      if (index >= 0 && rows[index]) {
        const message = session.messages[index];
        const bubble = rows[index].querySelector(".bubble");
        if (bubble) {
          const normalized = normalizeMessageContent(visibleContent);
          if (message) {
            if (normalized.length < normalizeMessageContent(message.content).length) message.displayContent = normalized;
            else delete message.displayContent;
          }
          const usePlainStreaming = isSessionGenerating(sessionId) && normalized.length > 24000;
          setBubbleContent(bubble, normalized, usePlainStreaming || normalized.length > 14000);
          bubble.classList.toggle("empty-bubble", !normalized.trim());
        }
        updateRenderedMessageStatus(rows[index], message, sessionId);
        refreshThinkingTimers();
      } else {
        renderMessages();
      }
      scrollToBottom();
    }

    function updateRenderedMessageStatus(row, message, sessionId) {
      if (!row || !message) return;
      row.querySelectorAll(".thinking-status:not(.image-time-status)").forEach(node => node.remove());
      const copyButton = row.querySelector(".message-copy-btn");
      const status = renderTextThinkingStatus(message, sessionId);
      if (status && copyButton) copyButton.insertAdjacentElement("afterend", status);
    }

    function setSessionSending(sessionId, value) {
      if (!sessionId) return;
      if (value) {
        activeRequests.set(sessionId, { controller: new AbortController(), startedAt: nowMs() });
      } else {
        activeRequests.delete(sessionId);
      }
      updateThinkingTimer();
      renderSessions();
      updateSendButton();
    }

    function updateThinkingTimer() {
      if (activeRequests.size && !thinkingTimer) {
        thinkingTimer = window.setInterval(refreshThinkingTimers, 1000);
      } else if (!activeRequests.size && thinkingTimer) {
        window.clearInterval(thinkingTimer);
        thinkingTimer = null;
      }
    }

    function refreshThinkingTimers() {
      const session = currentSession();
      if (!session) return;
      els.messages.querySelectorAll(".thinking-status.active").forEach(node => {
        const message = session.messages.find(item => item.id === node.dataset.messageId);
        const elapsed = node.querySelector(".thinking-elapsed");
        if (!message || !elapsed) return;
        const ms = node.dataset.timerKind === "image"
          ? getImageElapsedMs(message)
          : getThinkingElapsedMs(message);
        elapsed.textContent = formatThinkingDuration(ms);
      });
    }

    function stopGeneration(sessionId = state.currentSessionId) {
      const request = activeRequests.get(sessionId);
      if (request) request.controller.abort();
    }

    function downloadImage(src, filename = "generated-image.png") {
      const a = document.createElement("a");

      const stamp = new Date()

    async function addAttachments(fileList, kind) {
      const files = Array.from(fileList || []);
      for (const file of files) {
        const attachment = {
          id: uid(),
          kind,
          name: file.name,
          type: file.type || "application/octet-stream",
          size: file.size
        };
        if (kind === "image") {
          attachment.dataUrl = await readFileAsDataURL(file);
        } else if (isReadableTextFile(file)) {
          attachment.text = (await readFileAsText(file)).slice(0, 12000);
        }
        pendingAttachments.push(attachment);
      }
      renderAttachments();
      updateSendButton();
    }

    function isReadableTextFile(file) {
      return /^text\//.test(file.type)
        || /\.(txt|md|csv|json|xml|html|css|js|ts|tsx|jsx|py|java|c|cpp|h|hpp|rs|go|sql|toml|yaml|yml|log)$/i.test(file.name);
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderAttachments() {
      els.attachmentList.innerHTML = "";
      els.attachmentList.classList.toggle("has-items", pendingAttachments.length > 0);
      pendingAttachments.forEach(attachment => {
        const chip = document.createElement("div");
        chip.className = "attachment-chip";
        const thumb = attachment.kind === "image" && attachment.dataUrl
          ? `<div class="attachment-thumb"><img src="${attachment.dataUrl}" alt=""></div>`
          : `<div class="attachment-thumb"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>`;
        chip.innerHTML = `${thumb}<span>${escapeHtml(attachment.name)}</span><button type="button" title="移除">×</button>`;
        chip.querySelector("button").addEventListener("click", () => {
          pendingAttachments = pendingAttachments.filter(item => item.id !== attachment.id);
          renderAttachments();
          updateSendButton();
        });
        els.attachmentList.append(chip);
      });
    }

    function buildAttachmentText(attachments) {
      if (!attachments.length) return "";
      const lines = [];
      attachments.forEach(attachment => {
        if (attachment.text) {
          lines.push("", `文件：${attachment.name}`);
          lines.push("```");
          lines.push(attachment.text);
          lines.push("```");
        }
      });
      return lines.length ? "\n\n" + lines.join("\n") : "";
    }

    async function copyText(text, successMessage = "已复制") {
